<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Itinerario - TaxUSA</title>
    <script src="https://www.google.com/recaptcha/api.js?render=6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw"></script>
    <style>
        :root { 
            --primary: #7c3aed; 
            --bg: #f8fafc; 
            --white: #ffffff; 
            --card-note: #fffbeb; 
            --blue: #2563eb; 
            --accent: #f59e0b; 
            --success: #10b981;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --card-bg: #ffffff;
            --danger: #ef4444;
        }

        body.dark-mode {
            --bg: #0f172a;
            --white: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --card-bg: #1e293b;
            --card-note: #2d2d1a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text-main); transition: 0.3s; }
        
        .nav-bar { width: 100%; max-width: 500px; margin: 0 auto 15px; display: flex; gap: 8px; align-items: center; }
        .btn-nav { flex: 1; padding: 12px 5px; background: var(--white); border-radius: 12px; font-weight: 800; text-align: center; text-decoration: none; font-size: 0.65rem; border: 2px solid var(--primary); color: var(--primary); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        .settings-trigger { width: 45px; height: 45px; background: var(--white); border: 2px solid var(--border-color); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }

        .container { max-width: 500px; margin: 0 auto; }
        
        .card { background: var(--card-bg); padding: 20px; border-radius: 24px; border: 1px solid var(--border-color); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        h2 { font-size: 1.2rem; font-weight: 800; margin: 0 0 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 12px; background: var(--bg); color: var(--text-main); font-weight: 600; outline: none; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }

        .wait-times-card { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; border: none; }
        .wait-times-card h2 { color: white; }
        .wait-list { display: flex; flex-direction: column; gap: 8px; }
        .wait-item { background: rgba(255,255,255,0.15); padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 0.85rem; }
        .wait-time { background: white; color: var(--blue); padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; }

        .note-item { background: var(--card-note); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: flex-start; }
        .note-text { font-size: 0.9rem; font-weight: 600; line-height: 1.4; }

        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .settings-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card-bg); z-index: 1001; transition: 0.3s; padding: 25px; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .settings-drawer.open { right: 0; }
        .drawer-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg); color: var(--text-main); cursor: pointer; font-weight: 700; margin-bottom: 10px; font-size: 0.8rem; text-align: left; }

        .status-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-left: 5px; }
        .status-open { background: var(--success); color: white; }
        .status-closed { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="btn-nav">🏠 INICIO</a>
        <a href="comparador.html" class="btn-nav">🔍 COMP</a>
        <a href="compras.html" class="btn-nav">🛍️ GASTOS</a>
        <a href="unidades.html" class="btn-nav">⚖️ UNID</a>
        <button class="settings-trigger" onclick="window.toggleSettings()">⚙️</button>
    </div>

    <div class="container">
        <div class="card wait-times-card">
            <h2>🎢 Filas en Vivo</h2>
            <select id="parkSelect" onchange="window.loadWaitTimes()" style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); margin-bottom: 15px;">
                <option value="75" style="color: black;">Magic Kingdom 🏰</option>
                <option value="76" style="color: black;">Epcot 🌐</option>
                <option value="77" style="color: black;">Hollywood Studios 🎬</option>
                <option value="78" style="color: black;">Animal Kingdom 🦁</option>
                <option value="64" style="color: black;">Universal Studios 🌎</option>
                <option value="65" style="color: black;">Island of Adventure 🦖</option>
                <option value="epic-universe" style="color: black;">Epic Universe ⭐</option>
                <option value="66" style="color: black;">Volcano Bay 🌋</option>
            </select>
            <div id="waitList" class="wait-list">
                <p style="text-align:center; font-size: 0.8rem; opacity: 0.8;">Selecciona un parque...</p>
            </div>
        </div>

        <div class="card">
            <h2>📝 Notas de Viaje</h2>
            <div class="input-group">
                <textarea id="noteInput" placeholder="Escribe algo importante..." rows="3"></textarea>
                <button class="btn-add" onclick="window.saveNote()">GUARDAR NOTA</button>
            </div>
            <div id="notesContainer"></div>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="window.toggleSettings()"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <h3 style="color:var(--primary); margin-top:0;">Ajustes</h3>
        <button class="drawer-btn" id="darkModeBtn" onclick="window.toggleDarkMode()">🌙 Modo Oscuro</button>
        <button class="drawer-btn" onclick="location.reload()">🔄 Actualizar App</button>
        <button class="drawer-btn" onclick="window.logout()" style="margin-top: auto; color: var(--danger); border-color: #fecaca;">🚪 Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U", authDomain: "viajes-db538.firebaseapp.com", projectId: "viajes-db538", storageBucket: "viajes-db538.firebasestorage.app", messagingSenderId: "237311739178", appId: "1:237311739178:web:333e468b184c0402a98a53" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userUID = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                window.loadNotes();
                window.loadWaitTimes();
            } else {
                window.location.replace("login.html");
            }
        });

        window.loadWaitTimes = async () => {
            const parkId = document.getElementById('parkSelect').value;
            const container = document.getElementById('waitList');
            container.innerHTML = '<p style="text-align:center;">Consultando satélites... 🛰️</p>';

            try {
                const response = await fetch(`https://api.themeparks.wiki/v1/entity/${parkId}/live`);
                const data = await response.json();
                
                const attractions = data.liveData
                    .filter(item => item.entityType === "ATTRACTION")
                    .sort((a, b) => (b.queue?.STANDBY?.waitTime || 0) - (a.queue?.STANDBY?.waitTime || 0));

                container.innerHTML = attractions.length > 0 
                    ? attractions.map(att => {
                        const wait = att.queue?.STANDBY?.waitTime;
                        const isOpen = att.status === "OPERATING";
                        return `
                            <div class="wait-item">
                                <span>${att.name} ${!isOpen ? '<span class="status-badge status-closed">Cerrado</span>' : ''}</span>
                                <span class="wait-time">${isOpen ? (wait !== undefined ? wait + ' min' : '---') : '❌'}</span>
                            </div>
                        `;
                    }).join('')
                    : '<p style="text-align:center;">No hay datos disponibles ahora.</p>';
            } catch (error) {
                container.innerHTML = '<p style="text-align:center;">Error al cargar datos.</p>';
            }
        };

        window.saveNote = async () => {
            const text = document.getElementById('noteInput').value;
            if (!text || !userUID) return;
            await addDoc(collection(db, "notas"), { text, userId: userUID, createdAt: Date.now() });
            document.getElementById('noteInput').value = '';
        };

        window.loadNotes = () => {
            const q = query(collection(db, "notas"), where("userId", "==", userUID), orderBy("createdAt", "desc"));
            onSnapshot(q, (sn) => {
                document.getElementById('notesContainer').innerHTML = sn.docs.map(docSnap => `
                    <div class="note-item">
                        <div class="note-text">${docSnap.data().text}</div>
                        <div onclick="window.deleteNote('${docSnap.id}')" style="cursor:pointer; font-weight:bold; color:#94a3b8">×</div>
                    </div>
                `).join('');
            });
        }

        window.deleteNote = async (id) => { if(confirm('¿Eliminar?')) await deleteDoc(doc(db, "notas", id)); };
        
        window.toggleSettings = () => { 
            const d = document.getElementById('settingsDrawer');
            d.classList.toggle('open');
            document.getElementById('menuOverlay').style.display = d.classList.contains('open') ? 'block' : 'none';
        };

        window.toggleDarkMode = () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', isDark);
            document.getElementById('darkModeBtn').innerText = isDark ? "☀️ Modo Claro" : "🌙 Modo Oscuro";
        };

        if (localStorage.getItem('dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeBtn').innerText = "☀️ Modo Claro";
        }

        window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));
        
    </script>
</body>
</html>
