<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Itinerario Pro</title>
    <style>
        :root { --primary: #7c3aed; --bg: #f8fafc; --white: #ffffff; --card-note: #fffbeb; --blue: #2563eb; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .nav-bar { width: 100%; max-width: 450px; margin-bottom: 15px; display: flex; gap: 10px; }
        .btn-nav { flex: 1; padding: 12px; background: var(--white); border-radius: 14px; font-weight: 800; text-align: center; text-decoration: none; font-size: 0.8rem; border: 2px solid var(--blue); color: var(--blue); }
        
        .card { background: var(--white); padding: 1.5rem; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
        h2 { color: var(--primary); margin-top: 0; text-align: center; font-size: 1.4rem; }
        
        .settings-trigger { 
            position: absolute; top: 15px; right: 15px; background: #f1f5f9; 
            border: none; border-radius: 50%; width: 35px; height: 35px; 
            font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        textarea { width: 100%; padding: 15px; border: 2px solid #f1f5f9; border-radius: 16px; margin-bottom: 10px; font-size: 1rem; background: #f8fafc; font-family: inherit; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); background: white; }
        
        .btn-add { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        
        .list-container { width: 100%; max-width: 450px; margin-top: 10px; }
        .note-item { background: var(--card-note); padding: 15px; border-left: 5px solid #f59e0b; border-radius: 12px; margin-bottom: 12px; position: relative; }
        .note-text { font-size: 1rem; color: #451a03; font-weight: 500; white-space: pre-wrap; padding-right: 20px; }
        .note-date { font-size: 0.65rem; color: #92400e; margin-top: 8px; font-weight: 800; text-transform: uppercase; }
        .btn-delete-note { position: absolute; top: 10px; right: 12px; color: #b45309; font-weight: 900; font-size: 1.2rem; cursor: pointer; }

        /* Footer con bandera arreglada */
        .footer { margin-top: auto; padding: 20px 0; text-align: center; font-size: 0.75rem; color: #94a3b8; font-weight: 600; }
        .footer span { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .flag-icon { width: 18px; height: auto; border-radius: 2px; }

        /* Menú Ajustes */
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .settings-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 1001; transition: 0.3s; padding: 25px; display: flex; flex-direction: column; }
        .settings-drawer.open { right: 0; }
        .drawer-btn { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: 700; text-align: left; cursor: pointer; font-size: 0.85rem; }
        .btn-delete-acc { color: #ef4444; border-color: #fecaca; }
        .btn-logout { margin-top: auto; color: #64748b; border: none; background: #f1f5f9; text-align: center; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="btn-nav">🏠 INICIO</a>
        <a href="compras.html" class="btn-nav">🛍️ GASTOS</a>
    </div>

    <div class="card">
        <button class="settings-trigger" onclick="toggleSettings()">⚙️</button>
        <h2>📍 Itinerario</h2>
        <textarea id="noteInput" rows="4" placeholder="Anota vuelos, hoteles o recordatorios..."></textarea>
        <button class="btn-add" onclick="addNote()">AGREGAR AL HISTORIAL</button>
    </div>

    <div id="notesList" class="list-container">
        <p style="text-align:center; color:#94a3b8;">Cargando notas...</p>
    </div>

    <div class="footer">
        <span>
            Creado por Juan Cruz Bria 
            <img src="https://flagcdn.com/w40/ar.png" class="flag-icon" alt="Argentina">
        </span>
        <div style="margin-top: 4px; opacity: 0.7;">© 2026 Todos los derechos reservados</div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleSettings()"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <h3 style="margin-top:0; color: var(--primary);">Ajustes</h3>
        <p id="userEmail" style="font-size:0.75rem; color:#64748b; margin-bottom:20px; font-weight:700;"></p>
        <button class="drawer-btn" onclick="changePass()">📧 Cambiar clave</button>
        <button class="drawer-btn btn-delete-acc" onclick="eliminarCuenta()">🗑️ Eliminar Cuenta</button>
        <button class="drawer-btn btn-logout" onclick="logout()">🚪 Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail, deleteUser } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { 
            getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, doc, getDocs
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace("login.html");
            } else {
                currentUser = user;
                document.getElementById('userEmail').innerText = user.email;
                listenNotes(user.uid);
            }
        });

        function listenNotes(uid) {
            // Consulta directa sin metadatos complejos para evitar trabas
            const q = query(collection(db, "notas"), where("userId", "==", uid), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('notesList');
                if (snapshot.empty) {
                    container.innerHTML = '<div style="text-align:center; color:#94a3b8; margin-top:20px;">Sin notas guardadas.</div>';
                    return;
                }

                container.innerHTML = snapshot.docs.map(docSnap => {
                    const data = docSnap.data();
                    const date = data.createdAt ? new Date(data.createdAt) : new Date();
                    const dateStr = date.toLocaleString('es-AR', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                    }).toUpperCase();

                    return `
                        <div class="note-item">
                            <div class="btn-delete-note" onclick="deleteNote('${docSnap.id}')">×</div>
                            <div class="note-text">${data.text}</div>
                            <div class="note-date">${dateStr}</div>
                        </div>`;
                }).join('');
            }, (error) => {
                console.error("Error en tiempo real:", error);
                if(error.code === 'failed-precondition') {
                    document.getElementById('notesList').innerHTML = '<p style="text-align:center; color:red; font-size:0.7rem;">Falta crear índice en Firebase</p>';
                }
            });
        }

        window.addNote = async () => {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            try {
                await addDoc(collection(db, "notas"), {
                    text: text,
                    userId: currentUser.uid,
                    createdAt: Date.now()
                });
                input.value = '';
            } catch (e) {
                alert("Error al guardar: " + e.message);
            }
        };

        window.deleteNote = async (id) => {
            if (confirm('¿Eliminar esta nota?')) await deleteDoc(doc(db, "notas", id));
        };

        // --- Ajustes ---
        window.toggleSettings = () => {
            const d = document.getElementById('settingsDrawer');
            const o = document.getElementById('menuOverlay');
            d.classList.toggle('open');
            o.style.display = d.classList.contains('open') ? 'block' : 'none';
        };

        window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));

        window.changePass = () => {
            sendPasswordResetEmail(auth, currentUser.email)
                .then(() => alert("Mail de cambio de clave enviado"))
                .catch(e => alert(e.message));
        };

        window.eliminarCuenta = async () => {
            if(!confirm("⚠️ ¿BORRAR TODO? Esta acción es irreversible.")) return;
            try {
                const qn = query(collection(db, "notas"), where("userId", "==", currentUser.uid));
                const snn = await getDocs(qn);
                for(let d of snn.docs) await deleteDoc(doc(db, "notas", d.id));

                await deleteUser(currentUser);
                window.location.replace("login.html");
            } catch (e) {
                alert("Re-autenticación necesaria: Cierra sesión y vuelve a entrar para borrar la cuenta.");
            }
        };
    </script>
</body>
</html>
