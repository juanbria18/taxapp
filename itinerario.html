<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Itinerario Pro - Cloud</title>
    <style>
        :root { --primary: #7c3aed; --bg: #f8fafc; --white: #ffffff; --card-note: #fffbeb; --blue: #2563eb; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .nav-bar { width: 100%; max-width: 450px; margin-bottom: 15px; display: flex; gap: 10px; }
        .btn-nav { flex: 1; padding: 12px; background: var(--white); border-radius: 14px; font-weight: 800; text-align: center; text-decoration: none; font-size: 0.8rem; border: 2px solid var(--blue); color: var(--blue); }
        
        .card { background: var(--white); padding: 1.5rem; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { color: var(--primary); margin-top: 0; text-align: center; font-size: 1.4rem; }
        
        textarea { width: 100%; padding: 15px; border: 2px solid #f1f5f9; border-radius: 16px; margin-bottom: 10px; font-size: 1rem; background: #f8fafc; font-family: inherit; resize: none; outline: none; transition: border-color 0.3s; }
        textarea:focus { border-color: var(--primary); }
        
        .btn-add { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        
        .list-container { width: 100%; max-width: 450px; margin-top: 10px; }
        .note-item { background: var(--card-note); padding: 15px; border-left: 5px solid #f59e0b; border-radius: 12px; margin-bottom: 12px; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .note-text { font-size: 1rem; color: #451a03; font-weight: 500; white-space: pre-wrap; line-height: 1.4; padding-right: 25px; }
        .note-date { font-size: 0.65rem; color: #92400e; margin-top: 8px; font-weight: 700; text-transform: uppercase; }
        .btn-delete { position: absolute; top: 10px; right: 12px; color: #b45309; font-weight: 900; font-size: 1.2rem; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="btn-nav">🏠 INICIO</a>
        <a href="compras.html" class="btn-nav">🛍️ GASTOS</a>
    </div>

    <div class="card">
        <h2>📍 Itinerario</h2>
        <textarea id="noteInput" rows="4" placeholder="Anota vuelos, hoteles o recordatorios..."></textarea>
        <button id="btnSave" class="btn-add" onclick="addNote()">AGREGAR AL HISTORIAL</button>
    </div>

    <div id="notesList" class="list-container">
        <p style="text-align:center; color:#94a3b8;">Cargando notas...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { 
            getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, doc, enableIndexedDbPersistence 
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Habilitar persistencia de datos (esto ayuda a que se vea en el celular aunque la señal sea débil)
        enableIndexedDbPersistence(db).catch((err) => {
            console.warn("La persistencia no se pudo habilitar", err.code);
        });

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace("login.html");
            } else {
                listenNotes(user.uid);
            }
        });

        function listenNotes(uid) {
            const q = query(
                collection(db, "notas"), 
                where("userId", "==", uid), 
                orderBy("createdAt", "desc")
            );

            // onSnapshot es clave: mantiene la conexión abierta y actualiza apenas detecta cambios
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('notesList');
                if (snapshot.empty) {
                    container.innerHTML = '<div style="text-align:center; color:#94a3b8; margin-top:20px;">No hay notas guardadas.</div>';
                    return;
                }

                container.innerHTML = snapshot.docs.map(docSnap => {
                    const data = docSnap.data();
                    const dateStr = new Date(data.createdAt).toLocaleString('es-AR', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', hour12: true
                    }).replace(".", "").toUpperCase();
                    
                    return `
                        <div class="note-item">
                            <div class="btn-delete" onclick="deleteNote('${docSnap.id}')">×</div>
                            <div class="note-text">${data.text}</div>
                            <div class="note-date">${dateStr}</div>
                        </div>`;
                }).join('');
            }, (error) => {
                console.error("Error en tiempo real:", error);
            });
        }

        window.addNote = async () => {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            if (!text || !auth.currentUser) return;

            try {
                await addDoc(collection(db, "notas"), {
                    text: text,
                    userId: auth.currentUser.uid,
                    createdAt: Date.now()
                });
                input.value = '';
            } catch (e) {
                alert("Error al guardar: " + e.message);
            }
        };

        window.deleteNote = async (id) => {
            if (confirm('¿Eliminar esta nota?')) {
                await deleteDoc(doc(db, "notas", id));
            }
        };
    </script>
</body>
</html>
