<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Itinerario Pro - Cloud</title>
    <style>
        :root { --primary: #7c3aed; --bg: #f8fafc; --white: #ffffff; --card-note: #fffbeb; --blue: #2563eb; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* Barra de navegación superior consistente */
        .nav-bar { width: 100%; max-width: 450px; margin-bottom: 15px; display: flex; gap: 10px; }
        .btn-nav { flex: 1; padding: 12px; background: var(--white); border-radius: 14px; font-weight: 800; text-align: center; text-decoration: none; font-size: 0.8rem; border: 2px solid var(--blue); color: var(--blue); }
        
        .card { background: var(--white); padding: 1.5rem; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { color: var(--primary); margin-top: 0; text-align: center; font-size: 1.4rem; }
        
        textarea { width: 100%; padding: 15px; border: 2px solid #f1f5f9; border-radius: 16px; margin-bottom: 10px; font-size: 1rem; background: #f8fafc; font-family: inherit; resize: none; outline: none; transition: border-color 0.3s; }
        textarea:focus { border-color: var(--primary); }
        
        .btn-add { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

        .list-container { width: 100%; max-width: 450px; margin-top: 10px; }
        .note-item { background: var(--card-note); padding: 15px; border-left: 5px solid #f59e0b; border-radius: 12px; margin-bottom: 12px; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .note-text { font-size: 1rem; color: #451a03; font-weight: 500; white-space: pre-wrap; line-height: 1.4; padding-right: 25px; }
        .note-date { font-size: 0.65rem; color: #92400e; margin-top: 8px; font-weight: 700; text-transform: uppercase; opacity: 0.7; }
        .btn-delete { position: absolute; top: 10px; right: 12px; color: #b45309; font-weight: 900; font-size: 1.2rem; cursor: pointer; padding: 5px; }
        
        .footer-links { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; text-align: center; }
        .link-sub { background: none; border: none; color: #94a3b8; font-weight: 700; cursor: pointer; text-decoration: underline; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="btn-nav">🏠 INICIO</a>
        <a href="compras.html" class="btn-nav">🛍️ GASTOS</a>
    </div>

    <div class="card">
        <h2>📍 Itinerario y Notas</h2>
        <textarea id="noteInput" rows="4" placeholder="Vuelos, reservas de hotel, ideas para el viaje..."></textarea>
        <button id="btnSave" class="btn-add" onclick="addNote()">GUARDAR EN LA NUBE</button>
    </div>

    <div id="notesList" class="list-container">
        </div>

    <div class="footer-links">
        <button class="link-sub" style="color:#64748b" onclick="changePass()">Cambiar mi contraseña</button>
        <button class="link-sub" onclick="logout()">Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            query, 
            where, 
            orderBy, 
            onSnapshot, 
            deleteDoc, 
            doc 
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53",
            measurementId: "G-WYF0L0YSYJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // --- Seguridad y Sincronización ---
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace("login.html");
                return;
            }
            currentUser = user;
            listenNotes(user.uid);
        });

        // Escuchar cambios en tiempo real desde Firestore
        function listenNotes(uid) {
            const q = query(
                collection(db, "notas"), 
                where("userId", "==", uid), 
                orderBy("createdAt", "desc")
            );

            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('notesList');
                if (snapshot.empty) {
                    container.innerHTML = '<div style="text-align:center; color:#94a3b8; margin-top:20px;">No hay notas guardadas.</div>';
                    return;
                }

                container.innerHTML = snapshot.docs.map(docSnap => {
                    const data = docSnap.data();
                    const dateStr = new Date(data.createdAt).toLocaleString('es-AR', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                    });
                    return `
                        <div class="note-item">
                            <div class="btn-delete" onclick="deleteNote('${docSnap.id}')">×</div>
                            <div class="note-text">${data.text}</div>
                            <div class="note-date">${dateStr}</div>
                        </div>`;
                }).join('');
            });
        }

        // --- Acciones de la UI ---
        window.addNote = async () => {
            const input = document.getElementById('noteInput');
            const btn = document.getElementById('btnSave');
            const text = input.value.trim();

            if (!text || !currentUser) return;

            btn.disabled = true;
            try {
                await addDoc(collection(db, "notas"), {
                    text: text,
                    userId: currentUser.uid,
                    createdAt: Date.now()
                });
                input.value = '';
            } catch (e) {
                alert("Error al guardar: " + e.message);
            } finally {
                btn.disabled = false;
            }
        };

        window.deleteNote = async (noteId) => {
            if (confirm('¿Eliminar esta anotación permanentemente?')) {
                try {
                    await deleteDoc(doc(db, "notas", noteId));
                } catch (e) {
                    alert("Error al eliminar: " + e.message);
                }
            }
        };

        window.logout = () => signOut(auth);
        window.changePass = () => {
            sendPasswordResetEmail(auth, currentUser.email)
                .then(() => alert("Mail de restablecimiento enviado."))
                .catch(e => alert(e.message));
        };
    </script>
</body>
</html>
