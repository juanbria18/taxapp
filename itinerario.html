    const el = document.getElementById('tip-text');

            el.innerText = tipsList[currentTipIndex];
            
            if (typeof twemoji !== 'undefined') {
                twemoji.parse(el, { folder: 'svg', ext: '.svg' });
            }
            
            el.style.opacity = 1;
        }, 300);
    }

                { name: "🎬 Santa Monica Pier" }, { name: "🌌 Griffith Obs" }, { name: "🎢 Universal CA" }, { name: "🌟 Walk of Fame" }
            ]},
            sf: { tz: "America/Los_Angeles", spots: [
                { name: "🌉 Golden Gate" }, { name: "⛓️ Alcatraz" }, { name: "🦀 Pier 39" }, { name: "🚋 Lombard St" }
            ]},
            chicago: { tz: "America/Chicago", spots: [
                { name: "🫘 The Bean" }, { name: "🗼 Willis Tower" }, { name: "🎡 Navy Pier" }, { name: "🖼️ Art Institute" }
            ]},
            dc: { tz: "America/New_York", spots: [
                { name: "🏛️ Capitolio" }, { name: "🏠 Casa Blanca" }, { name: "🦒 Zoo Nacional" }, { name: "🚀 Museo Aeroespacial" }
            ]}
        };

        window.renderCityData = async () => {
            const cityKey = document.getElementById('citySelector').value;
            const container = document.getElementById('dynamicQueues');
            const cityData = citiesConfig[cityKey];
            
            container.innerHTML = cityData.spots.map((s, i) => `
                <div class="queue-card">
                    <div class="queue-name">${s.name}</div>
                    <div id="spot-${i}" class="queue-status">...</div>
                </div>
            `).join('') + (cityKey === 'orlando' ? '<div class="api-attribution"><a href="https://queue-times.com/">Powered by Queue-Times.com</a></div>' : '');

            updateStatusDisplay(cityKey);
        };

        async function updateStatusDisplay(cityKey) {
    const cityData = citiesConfig[cityKey];
    const lang = localStorage.getItem('appLang') || 'es'; // Detectar idioma
    const t = translations[lang]; // Atajo para las traducciones
    
    const localHour = parseInt(new Intl.DateTimeFormat("en-US", { 
        timeZone: cityData.tz, 
        hour: "numeric", 
        hour12: false 
    }).format(new Date()));

    for (let i = 0; i < cityData.spots.length; i++) {
        const el = document.getElementById(`spot-${i}`);
        if (!el) continue;

        if (cityKey === 'orlando' && cityData.spots[i].parkId) {
            if (localHour >= 22 || localHour < 8) {
                el.innerText = t.status_closed; el.className = "queue-status q-off";
            } else {
                try {
                    const proxy = "https://corsproxy.io/?";
                    const apiUrl = `https://queue-times.com/parks/${cityData.spots[i].parkId}/queue_times.json`;
                    const response = await fetch(proxy + encodeURIComponent(apiUrl));
                    const data = await response.json();
                    let total = 0, c = 0;
                    data.lands?.forEach(l => l.rides.forEach(r => { if(r.is_open){ total += r.wait_time; c++; } }));
                    const avg = c > 0 ? total / c : 0;
                    
                    if (avg <= 20) { el.innerText = t.status_low; el.className = "queue-status q-low"; }
                    else if (avg <= 45) { el.innerText = t.status_med; el.className = "queue-status q-med"; }
                    else { el.innerText = t.status_high; el.className = "queue-status q-high"; }
                } catch(e) { el.innerText = t.status_na; el.className = "queue-status q-off"; }
            }
        } else {
            // Lógica para ciudades sin API (basada en horario)
            if (localHour >= 23 || localHour < 7) { el.innerText = t.status_closed; el.className = "queue-status q-off"; }
            else if (localHour >= 12 && localHour <= 19) { el.innerText = t.status_high; el.className = "queue-status q-high"; }
            else if (localHour >= 9 && localHour < 12) { el.innerText = t.status_med; el.className = "queue-status q-med"; }
            else { el.innerText = t.status_low; el.className = "queue-status q-low"; }
        }
    }
}

        // --- FLUJO APP ---
        // --- FLUJO APP ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                // 1. Verificamos perfil
                if (!perfilId || perfilId === "null") {
                    window.location.replace("profiles.html");
                    return;
                }

                // 2. Foto de perfil en el botón⚙️
                const trigger = document.querySelector('.settings-trigger-nav');
                if (trigger) {
                    const imagenAMostrar = perfilFoto || user.photoURL;
                    if (imagenAMostrar) {
                        trigger.style.backgroundImage = `none`;
                        trigger.style.backgroundColor = "transparent";
                        trigger.style.borderRadius = "50%";
                    }
                }

                try {
                    // 3. Traemos el destino del perfil para setear el selector automáticamente
                    const profileRef = doc(db, "usuarios", user.uid, "perfiles", perfilId);
                    const snap = await getDoc(profileRef);

                    if (snap.exists()) {
                        const destinoPerfil = snap.data().destino ? snap.data().destino.toLowerCase() : "orlando";
                        
                        // Ponemos el selector en la ciudad que corresponde al viaje
                        const selector = document.getElementById('citySelector');
                        if (selector) {
                            selector.value = destinoPerfil;
                        }
                    }
                    
                    // 4. Cargamos los datos de la ciudad (Parques/Spots) y las notas
                    renderCityData(); 
                    listenNotes(); 
                    
                    // Mostramos el primer tip
                    document.getElementById('tip-text').innerText = tips[0];

                } catch (e) {
                    console.error("Error al cargar datos del perfil:", e);
                }
            } else {
                window.location.replace("login.html");
            }
        });

        window.addNote = async () => {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();

            // Verificamos que existan el Usuario y el Perfil antes de operar
            if (text && currentUser && perfilId) {
                try {
                    // RUTA: usuarios -> UID -> perfiles -> perfilId -> notas
                    const notesRef = collection(db, "usuarios", currentUser.uid, "perfiles", perfilId, "notas");
                    await addDoc(notesRef, {
                        text: text,
                        createdAt: Date.now()
                    });
                    input.value = "";
                    console.log("Nota guardada en el perfil activo");
                } catch (e) {
                    console.error("Error de Tesorería al añadir nota: ", e);
                }
            } else {
                alert("Por favor, escribí algo y asegurate de haber seleccionado un perfil.");
            }
        };

        function listenNotes() {
            // Si no hay perfil, no intentamos leer nada
            if (!currentUser || !perfilId || perfilId === "null") return;
            
            const notesRef = collection(db, "usuarios", currentUser.uid, "perfiles", perfilId, "notas");
            const q = query(notesRef, orderBy("createdAt", "desc"));
            
            onSnapshot(q, (sn) => {
                const container = document.getElementById('notesList');
                if (!container) return;

                container.innerHTML = sn.docs.map(docSnap => `
                    <div class="note-item">
                        <div class="note-text">${docSnap.data().text}</div>
                        <div onclick="window.deleteNote('${docSnap.id}')" style="cursor:pointer; font-weight:bold; color:#94a3b8; padding: 5px;">×</div>
                    </div>
                `).join('');
            });
        }

        window.deleteNote = async (id) => {
            if (confirm('¿Eliminar esta nota?')) {
                try {
                    // Importante: la ruta debe ser la misma donde se guardó
                    const docRef = doc(db, "usuarios", currentUser.uid, "perfiles", perfilId, "notas", id);
                    await deleteDoc(docRef);
                } catch (e) {
                    console.error("Error al eliminar nota: ", e);
                }
            }
        };    
        
        window.toggleSettings = () => { 
            const d = document.getElementById('settingsDrawer');
            d.classList.toggle('open');
            document.getElementById('menuOverlay').style.display = d.classList.contains('open') ? 'block' : 'none';
        };
       
        
        window.changeProfile = () => {
            // No borramos el usuario de Firebase, solo el perfil elegido
            localStorage.removeItem('perfilActivoId');
            localStorage.removeItem('perfilActivoNombre');
            localStorage.removeItem('perfilActivoFoto');
            window.location.href = "profiles.html";
        };

       // --- SISTEMA DE IDIOMAS ---

window.changeLanguage = (lang) => {
    // 1. Guardar la elección del usuario
    localStorage.setItem('appLang', lang);

    // 2. Marcar el botón activo (ES o EN) en el diseño
    document.querySelectorAll('.lang-opt').forEach(opt => opt.classList.remove('active'));
    document.getElementById('lang-' + lang)?.classList.add('active');

    // 3. Traducir textos con data-i18n
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
            el.innerText = translations[lang][key];
        }
    });

    // 4. Traducir placeholders (como el de las notas)
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (translations[lang] && translations[lang][key]) {
            el.setAttribute('placeholder', translations[lang][key]);
        }
    });

    // 5. Sincronizar el Tip de Viaje actual
    const tipElement = document.getElementById('tip-text');
    if (tipElement && typeof shoppingTips !== 'undefined' && shoppingTips[lang]) {
        tipElement.innerText = shoppingTips[lang][currentTipIndex || 0];
    }

    // 6. Actualizar las ciudades para que digan "LOW/HIGH" o "BAJA/ALTA"
    const citySelector = document.getElementById('citySelector');
    if (citySelector) {
        updateStatusDisplay(citySelector.value);
    }
};

        window.toggleDarkMode = () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', isDark);
            document.getElementById('darkModeBtn').innerText = isDark ? "☀️ Modo Claro" : "🌙 Modo Oscuro";
        };

        if (localStorage.getItem('dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeBtn').innerText = "☀️ Modo Claro";
        }

        window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));
        
        setInterval(() => { if(currentUser) renderCityData(); }, 120000);
    </script>
    <script>
    function avisoProximamente(event) {
        // Evita que la página intente recargarse al tocar el link
        event.preventDefault();
        
        // Muestra el mensaje
        alert("🚀 ¡El Comparador de Precios estará disponible próximamente!");
    }
    window.onload = () => {
        // 1. Cargamos el idioma guardado (o español por defecto)
        const savedLang = localStorage.getItem('appLang') || 'es';
        
        // 2. Aplicamos el idioma a toda la pantalla
        if (typeof window.changeLanguage === 'function') {
            window.changeLanguage(savedLang);
        }

        // 3. Cargamos el primer Tip manualmente al iniciar
        const tipEl = document.getElementById('tip-text');
        if (tipEl && typeof tips !== 'undefined') {
            tipEl.innerText = tips[savedLang][0];
            
            // Si usas twemoji lo aplicamos al inicio
            if (typeof twemoji !== 'undefined') {
                twemoji.parse(tipEl, { folder: 'svg', ext: '.svg' });
            }
        }

        // 4. Iniciamos el intervalo para que los tips roten cada 8 segundos
        setInterval(() => {
            if (typeof window.nextTip === 'function') window.nextTip();
        }, 8000);

        // 5. Verificamos el estado de Firebase
        if (typeof auth !== 'undefined') {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    window.currentUser = user;
                    const emailEl = document.getElementById('userEmail');
                    if (emailEl) emailEl.innerText = user.email;
                    
                    // Cargamos los datos de las filas de la ciudad inicial
                    if (typeof renderCityData === 'function') renderCityData();
                } else {
                    window.location.replace("login.html");
                }
            });
        }

        // 6. Refresco automático de estados de filas cada 2 minutos
        setInterval(() => { 
            if (window.currentUser && typeof renderCityData === 'function') {
                renderCityData(); 
            }
        }, 120000);
    };
</script>
