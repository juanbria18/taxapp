<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxUSA Pro</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h1 { margin: 0 0 1rem 0; font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .input-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 0.4rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 1rem; outline: none; background: white; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.2rem; }
        .cat-btn { padding: 10px; border: 2px solid #f1f5f9; border-radius: 12px; background: white; font-size: 0.65rem; font-weight: 800; color: #64748b; cursor: pointer; }
        .cat-btn.active { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
        .result-box { background: #eff6ff; padding: 1.2rem; border-radius: 20px; margin-top: 0.8rem; border: 1px dashed var(--primary); }
        .result-value { font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 4px 0; }
        
        .nav-buttons { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { text-decoration: none; padding: 16px; border-radius: 14px; font-weight: 800; text-align: center; font-size: 0.9rem; transition: 0.2s; }
        .btn-blue { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .btn-purple { background: #7c3aed; color: white; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2); }
        
        .footer-links { margin-top: 20px; display: flex; flex-direction: column; gap: 5px; }
        .logout-btn { background: none; border: none; color: #94a3b8; font-weight: 700; cursor: pointer; text-decoration: underline; font-size: 0.75rem; }
        .change-pass-btn { background: none; border: none; color: #64748b; font-weight: 600; cursor: pointer; font-size: 0.7rem; }
        
        /* Indicador de sincronización */
        #sync-status { font-size: 0.6rem; color: #10b981; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="sync-status">● Sincronizado con la nube</div>
        <h1>TaxUSA 🇺🇸</h1>
        
        <div class="input-group">
            <label>Precio Etiqueta (USD)</label>
            <input type="number" id="price" placeholder="0.00" oninput="calculate()" step="0.01">
        </div>

        <label>Categoría</label>
        <div class="category-grid">
            <button class="cat-btn active" id="btn-general" onclick="setCategory('general')">🛍️ GENERAL</button>
            <button class="cat-btn" id="btn-tech" onclick="setCategory('tech')">💻 TECH</button>
            <button class="cat-btn" id="btn-food" onclick="setCategory('food')">🍎 COMIDA</button>
            <button class="cat-btn" id="btn-med" onclick="setCategory('med')">💊 MEDICINA</button>
        </div>

        <div class="input-group">
            <label>Estado</label>
            <select id="state-select" onchange="loadCities()">
                <option value="Florida" selected>Florida</option>
                <option value="Alabama">Alabama</option><option value="Alaska">Alaska</option>
                <option value="Arizona">Arizona</option><option value="Arkansas">Arkansas</option>
                <option value="California">California</option><option value="Colorado">Colorado</option>
                <option value="New York">New York</option><option value="Texas">Texas</option>
                </select>
        </div>

        <div class="input-group">
            <label>Ciudad</label>
            <select id="city-select" onchange="calculate()"></select>
        </div>

        <div class="result-box">
            <div class="result-value" id="total">USD 0.00</div>
            <div id="tax-detail" style="font-size: 0.8rem; color: #3b82f6; font-weight: bold;">Tax: 6.5%</div>
        </div>

        <div class="nav-buttons">
            <a href="compras.html" class="nav-btn btn-blue">🛍️ SHOPPING Y PRESUPUESTO</a>
            <a href="itinerario.html" class="nav-btn btn-purple">📍 ITINERARIO Y NOTAS</a>
        </div>

        <div class="footer-links">
            <button class="change-pass-btn" onclick="changePass()">Cambiar mi contraseña</button>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53",
            measurementId: "G-WYF0L0YSYJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const data = {
            "Florida": [{n:"Orlando", t:6.5}, {n:"Miami", t:7.0}],
            "Alabama": [{n:"Birmingham", t:10.0}], "Alaska": [{n:"Anchorage", t:0}], 
            "Arizona": [{n:"Phoenix", t:8.6}], "Arkansas": [{n:"Little Rock", t:9.5}], 
            "California": [{n:"Los Angeles", t:9.5}], "Colorado": [{n:"Denver", t:8.81}],
            "New York": [{n:"NYC", t:8.875}], "Texas": [{n:"Houston", t:8.25}]
        };

        let currentCategory = 'general';

        window.loadCities = () => {
            const state = document.getElementById('state-select').value;
            const citySelect = document.getElementById('city-select');
            citySelect.innerHTML = "";
            if(data[state]) {
                data[state].forEach(city => {
                    let opt = document.createElement('option');
                    opt.value = city.t;
                    opt.text = `${city.n} (${city.t}%)`;
                    citySelect.appendChild(opt);
                });
            }
            window.calculate();
        };

        window.setCategory = (cat) => {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            window.calculate();
        };

        window.calculate = () => {
            const price = parseFloat(document.getElementById('price').value) || 0;
            let tax = parseFloat(document.getElementById('city-select').value) || 0;
            if (currentCategory === 'med' || currentCategory === 'food') tax = 0;
            const total = price + (price * (tax / 100));
            document.getElementById('total').innerText = 'USD ' + total.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('tax-detail').innerText = `Tax Aplicado: ${tax}%`;
        };

        window.changePass = () => {
            const userEmail = auth.currentUser.email;
            sendPasswordResetEmail(auth, userEmail).then(() => {
                alert("Mail enviado a " + userEmail);
            }).catch((e) => alert("Error: " + e.message));
        };

        window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));

        onAuthStateChanged(auth, (user) => { 
            if (!user) {
                window.location.replace("login.html");
            } else {
                document.getElementById('sync-status').style.display = 'block';
                console.log("Usuario activo:", user.email);
            }
        });
        
        window.onload = window.loadCities;
    </script>
</body>
</html>
