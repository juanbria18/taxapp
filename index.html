<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxUSA Pro Smart</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary: #1e40af; --success: #15803d; --bg: #f8fafc; --card-bg: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border: 1px solid #e2e8f0; }
        h2 { margin: 0 0 1.2rem 0; text-align: center; color: var(--primary); font-weight: 800; letter-spacing: -0.5px; }
        .field { margin-bottom: 0.8rem; }
        label { display: block; margin-bottom: 5px; font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 1rem; transition: 0.2s; background: #f8fafc; }
        input:focus, select:focus { outline: none; border-color: var(--primary); background: #fff; }
        .alert-tax { background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; padding: 10px; border-radius: 12px; font-size: 0.75rem; margin-bottom: 12px; display: none; }
        .result-box { margin: 1.2rem 0; padding: 1.5rem; background: #f0fdf4; border-radius: 20px; text-align: center; border: 1px solid #dcfce7; }
        .total-price { font-size: 2.8rem; font-weight: 900; color: var(--success); }
        button { width: 100%; padding: 16px; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 1rem; transition: 0.3s; background-color: var(--primary); color: white; }
        button:active { transform: scale(0.98); }
        .history { margin-top: 2rem; width: 100%; max-width: 450px; }
        .history-item { background: white; padding: 15px; border-radius: 16px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-weight: 700; color: #0f172a; }
        .item-meta { color: #64748b; font-size: 0.7rem; }
        .item-total { font-weight: 800; color: var(--success); font-size: 1.2rem; }
        @media (max-width: 480px) { body { padding: 10px; } .total-price { font-size: 2.2rem; } }
    </style>
</head>
<body>

<div class="card">
    <h2>TaxUSA Smart 🇺🇸</h2>
    <div id="tax-alert" class="alert-tax"></div>
    <div class="field"><label>Nombre del Producto</label><input type="text" id="nombreItem" placeholder="Ej: PlayStation 5"></div>
    <div class="field">
        <label>Categoría</label>
        <select id="categoria" onchange="calcular()">
            <option value="general">General</option>
            <option value="ropa">Ropa / Calzado</option>
            <option value="comida">Comida (Super)</option>
            <option value="medicina">Medicina</option>
        </select>
    </div>
    <div style="display: flex; gap: 10px;">
        <div class="field" style="flex: 2;"><label>Precio Base</label><input type="number" id="psi" placeholder="0.00" oninput="calcular()"></div>
        <div class="field" style="flex: 1;"><label>Tax %</label><input type="number" id="pci" step="0.01" oninput="calcular()"></div>
    </div>
    <div class="field"><label>Estado</label><select id="estado" onchange="cargarCiudades()"></select></div>
    <div class="field" id="contenedor-ciudad" style="display:none;"><label>Ciudad</label><select id="ciudad" onchange="actualizarTax()"></select></div>
    <div class="result-box">
        <div class="total-price" id="total">USD 0.00</div>
        <div id="detalle" style="font-size: 0.8rem; color: #166534;"></div>
    </div>
    <button onclick="guardar()">GUARDAR EN HISTORIAL</button>
</div>

<div class="history">
    <div style="display:flex; justify-content: space-between; padding: 0 10px; margin-bottom: 10px;">
        <span style="font-weight: 700; color: #64748b; font-size: 0.8rem;">RECIENTES</span>
        <span onclick="borrarTodo()" style="color: #ef4444; font-size: 0.8rem; cursor: pointer;">Borrar Historial</span>
    </div>
    <div id="lista-historial"></div>
</div>

<script>
    const dbTax = {
        "Alabama": {"Birmingham": 10.0}, "Alaska": {"Anchorage": 0.0}, "Arizona": {"Phoenix": 8.6}, "Arkansas": {"Little Rock": 9.625}, 
        "California": {"LA": 9.5, "SF": 8.62, "San Diego": 7.75}, "Colorado": {"Denver": 8.81}, "Connecticut": {"Todo": 6.35}, 
        "Delaware": {"No Tax": 0.0}, "Florida": {"Orlando": 6.5, "Miami": 7.0, "Tampa": 7.5, "Broward": 7.0}, "Georgia": {"Atlanta": 8.9}, 
        "Hawaii": {"Honolulu": 4.5}, "Idaho": {"Boise": 6.0}, "Illinois": {"Chicago": 10.25}, "Indiana": {"Indy": 7.0}, 
        "Iowa": {"Des Moines": 7.0}, "Kansas": {"Wichita": 7.5}, "Kentucky": {"Louisville": 6.0}, "Louisiana": {"New Orleans": 9.45}, 
        "Maine": {"Portland": 5.5}, "Maryland": {"Baltimore": 6.0}, "Massachusetts": {"Boston": 6.25}, "Michigan": {"Detroit": 6.0}, 
        "Minnesota": {"Minneapolis": 8.025}, "Mississippi": {"Jackson": 8.0}, "Missouri": {"St. Louis": 9.679}, "Montana": {"No Tax": 0.0}, 
        "Nebraska": {"Omaha": 7.0}, "Nevada": {"Las Vegas": 8.37}, "New Hampshire": {"No Tax": 0.0}, "New Jersey": {"Jersey City": 6.62}, 
        "New Mexico": {"Albuquerque": 7.75}, "New York": {"NYC": 8.875, "Buffalo": 8.75}, "North Carolina": {"Charlotte": 7.25}, 
        "North Dakota": {"Fargo": 7.5}, "Ohio": {"Cleveland": 8.0}, "Oklahoma": {"OKC": 8.62}, "Oregon": {"No Tax": 0.0}, 
        "Pennsylvania": {"Philly": 8.0}, "Rhode Island": {"Providence": 7.0}, "South Carolina": {"Charleston": 9.0}, "South Dakota": {"Sioux Falls": 6.5}, 
        "Tennessee": {"Nashville": 9.25}, "Texas": {"Houston": 8.25, "Dallas": 8.25, "Austin": 8.25}, "Utah": {"SLC": 7.75}, 
        "Vermont": {"Burlington": 7.0}, "Virginia": {"Beach": 6.0}, "Washington": {"Seattle": 10.25}, "West Virginia": {"Charleston": 7.0}, 
        "Wisconsin": {"Milwaukee": 5.5}, "Wyoming": {"Cheyenne": 6.0}
    };

    function calcular() {
        const p = parseFloat(document.getElementById('psi').value) || 0;
        let t = parseFloat(document.getElementById('pci').value) || 0;
        const e = document.getElementById('estado').value;
        const c = document.getElementById('categoria').value;
        const alertBox = document.getElementById('tax-alert');
        let msg = "";

        // Reglas Inteligentes
        if(c === "comida" && ["Florida", "California", "Texas", "New York", "Pennsylvania"].includes(e)) { t = 0; msg = "Comida exenta en " + e; }
        else if(c === "ropa" && (e === "Pennsylvania" || e === "New Jersey")) { t = 0; msg = "Ropa exenta en " + e; }
        else if(c === "ropa" && e === "New York" && p < 110) { t = 4.875; msg = "Ropa < $110 en NY: Solo tax local."; }

        alertBox.innerText = msg; alertBox.style.display = msg ? "block" : "none";
        const total = p * (1 + (t/100));
        document.getElementById('total').innerText = 'USD ' + total.toLocaleString('en-US', {minimumFractionDigits: 2});
        document.getElementById('detalle').innerText = p > 0 ? `Tax Final: ${t}% (+ $${(total-p).toFixed(2)})` : "";
    }

    function init() {
        const selE = document.getElementById('estado');
        selE.add(new Option("Estado...", ""));
        Object.keys(dbTax).sort().forEach(e => selE.add(new Option(e, e)));
        mostrar();
    }

    function cargarCiudades() {
        const e = document.getElementById('estado').value;
        const selC = document.getElementById('ciudad');
        selC.innerHTML = '';
        if(e && dbTax[e]) {
            document.getElementById('contenedor-ciudad').style.display = 'block';
            Object.keys(dbTax[e]).forEach(c => selC.add(new Option(c, dbTax[e][c])));
            actualizarTax();
        }
    }

    function actualizarTax() { document.getElementById('pci').value = document.getElementById('ciudad').value; calcular(); }

    function guardar() {
        const psi = document.getElementById('psi').value;
        if(!psi) return;
        const h = JSON.parse(localStorage.getItem('taxApp')) || [];
        h.unshift({ n: document.getElementById('nombreItem').value || "Item", t: document.getElementById('total').innerText, m: document.getElementById('estado').value });
        localStorage.setItem('taxApp', JSON.stringify(h.slice(0, 10)));
        mostrar();
    }

    function mostrar() {
        const h = JSON.parse(localStorage.getItem('taxApp')) || [];
        document.getElementById('lista-historial').innerHTML = h.map(i => `<div class="history-item"><div class="item-info"><span class="item-name">${i.n}</span><span class="item-meta">${i.m}</span></div><div class="item-total">${i.t}</div></div>`).join('');
    }

    function borrarTodo() { localStorage.removeItem('taxApp'); mostrar(); }
    init();
</script>
</body>
</html>
