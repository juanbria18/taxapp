<div id="settingsDrawer" class="settings-drawer">
    <div class="drawer-header">
        <h3 style="margin:0;">Ajustes</h3>
        <span class="close-drawer" onclick="toggleSettings()">×</span>
    </div>

    <div class="user-pill">
        <span>Usuario</span>
        <b id="userEmail">cargando...</b>
    </div>

    <button class="drawer-btn" onclick="changePass()">📧 Cambiar contraseña</button>
    <button class="drawer-btn" onclick="alert('Versión 2.0 - Firestore Cloud Enabled')">ℹ️ Información de la App</button>

    <button class="drawer-btn" style="color: #ef4444; border-color: #fecaca; margin-top: 10px;" onclick="eliminarCuenta()">🗑️ Eliminar Cuenta</button>
    
    <button class="drawer-btn btn-logout" onclick="logout()">🚪 Cerrar Sesión</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail, deleteUser } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    // ... (resto de tu config de firebase) ...

    window.eliminarCuenta = async () => {
        const user = auth.currentUser;
        if (!user) return;

        const confirmar = confirm("⚠️ ¿ESTÁS SEGURO? Se borrarán todas tus notas, gastos y tu cuenta permanentemente. Esta acción no se puede deshacer.");
        if (!confirmar) return;

        try {
            // 1. Borrar Notas
            const qNotas = query(collection(db, "notas"), where("userId", "==", user.uid));
            const snapNotas = await getDocs(qNotas);
            snapNotas.forEach(async (d) => await deleteDoc(doc(db, "notas", d.id)));

            // 2. Borrar Compras
            const qCompras = query(collection(db, "compras"), where("userId", "==", user.uid));
            const snapCompras = await getDocs(qCompras);
            snapCompras.forEach(async (d) => await deleteDoc(doc(db, "compras", d.id)));

            // 3. Borrar el usuario de Auth
            await deleteUser(user);
            
            alert("Cuenta y datos eliminados correctamente.");
            window.location.replace("login.html");
        } catch (e) {
            console.error(e);
            if (e.code === 'auth/requires-recent-login') {
                alert("Por seguridad, debes cerrar sesión y volver a entrar para eliminar tu cuenta.");
            } else {
                alert("Error al eliminar cuenta: " + e.message);
            }
        }
    };
    // ... resto de tus funciones ...
</script>
