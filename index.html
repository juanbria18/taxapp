<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxUSA</title>
    <script src="https://www.google.com/recaptcha/api.js?render=6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --accent: #7c3aed; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .card { background: var(--card); padding: 1.5rem; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; position: relative; }
        
        h1 { margin: 0 0 0.5rem 0; font-size: 1.6rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; }

        .countdown-box {
            background: #f1f5f9; padding: 12px; border-radius: 16px; margin-bottom: 1.5rem;
            display: flex; flex-direction: column; gap: 2px; cursor: pointer; position: relative;
            border: 2px solid transparent; transition: 0.2s;
        }
        .countdown-box:active { transform: scale(0.98); border-color: var(--primary); }
        .countdown-label { font-size: 0.6rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        #timer { font-size: 1.1rem; font-weight: 900; color: #1e3a8a; letter-spacing: 0.5px; }
        .edit-hint { position: absolute; top: 5px; right: 8px; font-size: 0.7rem; opacity: 0.5; }
        
        .input-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 0.4rem; text-transform: uppercase; margin-left: 5px; }
        input, select { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 0.9rem; outline: none; background: white; font-weight: 600; }
        
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.2rem; }
        .cat-btn { padding: 15px 10px; border: 2px solid #f1f5f9; border-radius: 16px; background: white; font-size: 0.7rem; font-weight: 800; color: #64748b; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .cat-btn.active { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
        
        .tip-section { margin-bottom: 1.2rem; text-align: left; }
        .tip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
        .tip-btn { padding: 10px 2px; border: 2px solid #f1f5f9; border-radius: 12px; background: white; font-size: 0.7rem; font-weight: 800; color: #64748b; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .tip-btn span { font-size: 0.55rem; font-weight: 600; opacity: 0.8; }
        .tip-btn.active { border-color: var(--accent); background: #f5f3ff; color: var(--accent); }
        
        .custom-tip-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f1f5f9; 
            border-radius: 14px; 
            padding: 8px 12px; 
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .custom-tip-container:focus-within { border-color: var(--accent); background: #f5f3ff; }
        .custom-tip-header { display: flex; align-items: center; justify-content: center; width: 100%; gap: 5px; }
        .custom-tip-header span { font-weight: 800; color: #64748b; font-size: 0.7rem; }
        #custom-tip-input { background: transparent; border: none; padding: 0; text-align: center; font-size: 0.8rem; color: var(--accent); width: 40px; font-weight: 800; outline: none; }
        #val-tip-custom { font-size: 0.55rem; font-weight: 600; color: var(--accent); opacity: 0.8; margin-top: 2px; }

        .result-box { background: #eff6ff; padding: 1.2rem; border-radius: 20px; margin-top: 0.8rem; border: 2px dashed var(--primary); margin-bottom: 10px; }
        .result-value { font-size: 2rem; font-weight: 900; color: var(--primary); margin: 2px 0; }
        .final-box { background: var(--primary); padding: 1.2rem; border-radius: 20px; color: white; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(37,99,235,0.2); }
        .final-value { font-size: 2.2rem; font-weight: 900; margin: 4px 0; }

        .nav-buttons { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { text-decoration: none; padding: 16px; border-radius: 14px; font-weight: 800; text-align: center; font-size: 0.9rem; transition: 0.2s; border: none; cursor: pointer; }
        .btn-blue { background: #2563eb; color: white; width: 100%; }
        .btn-purple { background: #7c3aed; color: white; }
        .btn-cyan { background: #0ea5e9; color: white; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 100%; max-width: 350px; }
        .settings-trigger { position: absolute; top: 15px; right: 15px; background: #f1f5f9; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .settings-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 1001; transition: 0.3s; padding: 25px; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .settings-drawer.open { right: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .drawer-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-weight: 700; margin-bottom: 10px; font-size: 0.8rem; text-align: left; }
        .btn-danger { color: #ef4444; border-color: #fecaca; }

        .footer { margin-top: 30px; text-align: center; font-size: 0.75rem; color: #94a3b8; font-weight: 600; padding-bottom: 10px; }
        .api-credits { font-size: 0.55rem; color: #cbd5e1; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 20px; text-align: center; font-weight: 500; }
    </style>
</head>
<body>

    <div class="card">
        <button class="settings-trigger" onclick="toggleSettings()">⚙️</button>
        <h1>TaxUSA <img src="https://flagcdn.com/w40/us.png" style="width: 28px; border-radius: 3px;" alt="USA"></h1>
        
        <div class="countdown-box" id="box-trip" onclick="openTripModal()">
            <span class="edit-hint">✏️</span>
            <span class="countdown-label" id="trip-label">Cargando viaje...</span>
            <span id="timer">00d 00h 00m 00s</span>
        </div>
        
        <div class="input-group">
            <label>Precio en Etiqueta (USD)</label>
            <input type="number" id="price" placeholder="0.00" oninput="calculate()" step="0.01" inputmode="decimal">
        </div>

        <label>Categoría</label>
        <div class="category-grid">
            <button class="cat-btn active" id="btn-general" onclick="setCategory('general')">🛍️ GENERAL</button>
            <button class="cat-btn" id="btn-tech" onclick="setCategory('tech')">💻 TECH</button>
            <button class="cat-btn" id="btn-food" onclick="setCategory('food')">🍎 COMIDA</button>
            <button class="cat-btn" id="btn-med" onclick="setCategory('med')">💊 MEDICINA</button>
        </div>

        <div class="input-group">
            <label>Estado</label>
            <select id="state-select" onchange="loadCities()"></select>
        </div>

        <div class="input-group">
            <label>Ciudad / Condado</label>
            <select id="city-select" onchange="calculate()"></select>
        </div>

        <div class="result-box">
            <div class="result-value" id="total-with-tax">USD 0.00</div>
            <div id="tax-detail" style="font-size: 0.8rem; color: #3b82f6; font-weight: bold;">Tax Aplicado: 0%</div>
        </div>

        <div class="tip-section">
            <label>Propina (Tip)</label>
            <div class="tip-grid">
                <button class="tip-btn" id="tip-0" onclick="setTip(0)">0% <span id="val-tip-0">$0.00</span></button>
                <button class="tip-btn" id="tip-10" onclick="setTip(10)">10% <span id="val-tip-10">$0.00</span></button>
                <button class="tip-btn active" id="tip-15" onclick="setTip(15)">15% <span id="val-tip-15">$0.00</span></button>
                <button class="tip-btn" id="tip-20" onclick="setTip(20)">20% <span id="val-tip-20">$0.00</span></button>
            </div>
            
            <div class="custom-tip-container">
                <div class="custom-tip-header">
                    <span>OTRO</span>
                    <input type="number" id="custom-tip-input" placeholder="0" oninput="setCustomTip()" inputmode="numeric">
                    <span>%</span>
                </div>
                <span id="val-tip-custom">$0.00</span>
            </div>
        </div>

        <div class="final-box">
            <label style="color: rgba(255,255,255,0.8); margin: 0;">TOTAL FINAL (INC. TIP)</label>
            <div class="final-value" id="final-total">USD 0.00</div>
        </div>

        <div id="dynamic-tip" style="background: #f0fdf4; padding: 10px; border-radius: 12px; font-size: 0.75rem; color: #166534; font-weight: 700; margin-bottom: 15px; border: 1px solid #bbf7d0;">
            💡 <span id="tip-content">Cargando tip económico...</span>
        </div>

        <div class="nav-buttons">
            <a href="unidades.html" class="nav-btn btn-cyan">⚖️ CONVERSOR UNIDADES</a>
            <a href="compras.html" class="nav-btn btn-blue">🛒 GASTOS Y TALLES</a>
            <a href="itinerario.html" class="nav-btn btn-purple">📍 ITINERARIO</a>
        </div>
    </div>

    <div class="footer">
        <span>Creado por Juan Cruz Bria <img src="https://flagcdn.com/w40/ar.png" style="width:18px;" alt="Argentina"></span>
    </div>
    <div class="api-credits">
        APIs USADAS: Firebase • FlagCDN • Google Auth • reCAPTCHA v3
    </div>

    <div id="tripModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color: var(--primary);">Mi Viaje</h3>
            <div class="input-group">
                <label>¿A qué ciudad vas?</label>
                <input type="text" id="input-destination" placeholder="Ej: Orlando">
            </div>
            <div class="input-group">
                <label>Fecha del viaje</label>
                <input type="date" id="input-date">
            </div>
            <button class="nav-btn btn-blue" onclick="saveTripSettings()">GUARDAR</button>
            <button onclick="closeTripModal()" style="width:100%; background:none; border:none; margin-top:15px; color:#64748b; font-weight:700; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleSettings()"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <h3 style="margin-top:0; color: var(--primary);">Ajustes</h3>
        <p id="userEmail" style="font-size:0.75rem; color:#64748b; margin-bottom:20px; font-weight:700;"></p>
        
        <button class="drawer-btn" onclick="updateEmail()">📧 Cambiar Correo (Verificación)</button>
        <button class="drawer-btn" onclick="changePassword()">🔑 Cambiar Contraseña</button>
        <button class="drawer-btn" onclick="logout()">🚪 Cerrar Sesión</button>
        
        <div style="margin-top: auto; padding-top: 20px;">
            <button class="drawer-btn btn-danger" onclick="deleteAccount()">⚠️ Eliminar Cuenta</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { 
            getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail, deleteUser, verifyBeforeUpdateEmail 
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { 
            getFirestore, doc, setDoc, getDoc, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let tripData = { destination: "Orlando", date: "2027-01-01" };
        let currentTipPercentage = 15;

        // Función para obtener token reCAPTCHA v3
        async function getRecaptchaToken(actionName) {
            return new Promise((resolve) => {
                grecaptcha.ready(() => {
                    grecaptcha.execute('6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw', {action: actionName}).then((token) => {
                        resolve(token);
                    });
                });
            });
        }

        const taxData = {
            "Alabama": [{n:"Promedio", t:9.29}], "Alaska": [{n:"Sin Tax", t:0}], "Arizona": [{n:"Phoenix", t:8.6}], "Arkansas": [{n:"Little Rock", t:9.51}],
            "California": [{n:"Los Angeles", t:9.5}, {n:"San Francisco", t:8.63}, {n:"San Diego", t:7.75}], "Colorado": [{n:"Denver", t:8.81}],
            "Connecticut": [{n:"Promedio", t:6.35}], "Delaware": [{n:"Sin Tax", t:0}],
            "Florida": [{n:"Orlando", t:6.5}, {n:"Miami", t:7.0}, {n:"Tampa", t:8.5}, {n:"Kissimmee", t:7.5}],
            "Georgia": [{n:"Atlanta", t:8.9}], "Hawaii": [{n:"Honolulu", t:4.5}], "Idaho": [{n:"Boise", t:6.0}], "Illinois": [{n:"Chicago", t:10.25}],
            "Indiana": [{n:"Promedio", t:7.0}], "Iowa": [{n:"Des Moines", t:7.0}], "Kansas": [{n:"Wichita", t:7.5}], "Kentucky": [{n:"Promedio", t:6.0}],
            "Louisiana": [{n:"New Orleans", t:9.45}], "Maine": [{n:"Promedio", t:5.5}], "Maryland": [{n:"Promedio", t:6.0}], "Massachusetts": [{n:"Boston", t:6.25}],
            "Michigan": [{n:"Promedio", t:6.0}], "Minnesota": [{n:"Minneapolis", t:8.03}], "Mississippi": [{n:"Promedio", t:7.07}], "Missouri": [{n:"St. Louis", t:8.29}],
            "Montana": [{n:"Sin Tax", t:0}], "Nebraska": [{n:"Omaha", t:7.0}], "Nevada": [{n:"Las Vegas", t:8.38}], "New Hampshire": [{n:"Sin Tax", t:0}],
            "New Jersey": [{n:"Jersey City", t:6.63}], "New Mexico": [{n:"Albuquerque", t:7.88}], "New York": [{n:"NYC", t:8.88}, {n:"Buffalo", t:8.75}],
            "North Carolina": [{n:"Charlotte", t:7.25}], "North Dakota": [{n:"Fargo", t:6.85}], "Ohio": [{n:"Columbus", t:7.5}], "Oklahoma": [{n:"Oklahoma City", t:8.63}],
            "Oregon": [{n:"Sin Tax", t:0}], "Pennsylvania": [{n:"Philadelphia", t:8.0}], "Rhode Island": [{n:"Promedio", t:7.0}], "South Carolina": [{n:"Charleston", t:9.0}],
            "South Dakota": [{n:"Sioux Falls", t:6.4}], "Tennessee": [{n:"Nashville", t:9.25}], "Texas": [{n:"Houston", t:8.25}, {n:"Dallas", t:8.25}, {n:"Austin", t:8.25}],
            "Utah": [{n:"Salt Lake City", t:7.75}], "Vermont": [{n:"Burlington", t:7.0}], "Virginia": [{n:"Virginia Beach", t:6.0}], "Washington": [{n:"Seattle", t:10.25}],
            "West Virginia": [{n:"Promedio", t:6.5}], "Wisconsin": [{n:"Milwaukee", t:5.5}], "Wyoming": [{n:"Cheyenne", t:6.0}]
        };

        const econTips = [
            "Delaware y Oregon tienen 0% de Sales Tax. Ideal para comprar Apple o lujo.",
            "En NYC, la ropa y calzado de menos de $110 están exentos de tax municipal.",
            "New Jersey tiene 0% de tax en ropa. Ideal si estás cerca de NYC (Jersey Gardens).",
            "En Miami, el tax es del 7%. Los outlets como Sawgrass rinden más por cupones.",
            "Texas ofrece 'Tax Free Shopping' para turistas extranjeros en ciertos locales.",
            "Recuerda que en EE.UU. el precio de etiqueta NUNCA incluye el impuesto."
        ];

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.replace("login.html"); } 
            else {
                currentUser = user;
                document.getElementById('userEmail').innerText = user.email;
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists() && docSnap.data().trip) { tripData = docSnap.data().trip; }
                updateTripUI();
            }
        });

        // Lógica de Ajustes
        window.updateEmail = async () => {
            const token = await getRecaptchaToken('update_email');
            const newEmail = prompt("Ingresa el nuevo correo electrónico para verificar:");
            if (newEmail && newEmail !== currentUser.email && newEmail.includes("@")) {
                try {
                    await verifyBeforeUpdateEmail(currentUser, newEmail);
                    alert("Se ha enviado un correo de verificación. Token verificado.");
                    toggleSettings();
                } catch (e) { 
                    alert("Error: Por seguridad, debes haber iniciado sesión recientemente."); 
                }
            } else if (newEmail) { alert("Correo inválido."); }
        };

        window.changePassword = async () => {
            await getRecaptchaToken('change_password');
            try {
                await sendPasswordResetEmail(auth, currentUser.email);
                alert("Correo de restablecimiento enviado a " + currentUser.email);
            } catch (e) { alert("Error: " + e.message); }
        };

        window.deleteAccount = async () => {
            await getRecaptchaToken('delete_account');
            if (confirm("¿ESTÁS SEGURO? Esta acción eliminará todos tus datos.")) {
                try {
                    await deleteDoc(doc(db, "users", currentUser.uid));
                    await deleteUser(currentUser);
                    window.location.replace("login.html");
                } catch (e) { alert("Error: Re-autenticación necesaria."); }
            }
        };

        // Lógica de Calculadora
        window.setCategory = (cat) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            window.calculate();
        };

        window.setTip = (percent) => {
            currentTipPercentage = percent;
            document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tip-' + percent).classList.add('active');
            document.getElementById('custom-tip-input').value = "";
            window.calculate();
        };

        window.setCustomTip = () => {
            const val = parseFloat(document.getElementById('custom-tip-input').value);
            if (!isNaN(val)) {
                currentTipPercentage = val;
                document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
            } else { currentTipPercentage = 0; }
            window.calculate();
        };

        window.calculate = () => {
            const price = parseFloat(document.getElementById('price').value) || 0;
            let tax = parseFloat(document.getElementById('city-select').value) || 0;
            const categoryBtn = document.querySelector('.cat-btn.active');
            
            if (categoryBtn && (categoryBtn.id === 'btn-med' || categoryBtn.id === 'btn-food')) tax = 0;
            
            const subtotal = price + (price * (tax / 100));
            
            [0, 10, 15, 20].forEach(p => {
                const amount = subtotal * (p / 100);
                document.getElementById(`val-tip-${p}`).innerText = `$${amount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            });

            const customVal = parseFloat(document.getElementById('custom-tip-input').value) || 0;
            const customAmount = subtotal * (customVal / 100);
            document.getElementById('val-tip-custom').innerText = `$${customAmount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            const tipAmount = subtotal * (currentTipPercentage / 100);
            const finalTotal = subtotal + tipAmount;

            document.getElementById('total-with-tax').innerText = 'USD ' + subtotal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('tax-detail').innerText = `Tax Aplicado: ${tax}%`;
            document.getElementById('final-total').innerText = 'USD ' + finalTotal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        };

        window.loadCities = () => {
            const state = document.getElementById('state-select').value;
            const citySelect = document.getElementById('city-select');
            citySelect.innerHTML = "";
            if(taxData[state]) {
                taxData[state].forEach(city => {
                    let opt = document.createElement('option');
                    opt.value = city.t; opt.text = `${city.n} (${city.t}%)`;
                    citySelect.appendChild(opt);
                });
            }
            window.calculate();
        };

        // Lógica de Viaje
        window.saveTripSettings = async () => {
            await getRecaptchaToken('save_trip');
            tripData = { 
                destination: document.getElementById('input-destination').value || "Orlando", 
                date: document.getElementById('input-date').value || "2027-01-01" 
            };
            updateTripUI();
            closeTripModal();
            if(currentUser) await setDoc(doc(db, "users", currentUser.uid), { trip: tripData }, { merge: true });
        };

        function updateTripUI() {
            document.getElementById('trip-label').innerText = `Faltan para ${tripData.destination} ✈️`;
            document.getElementById('input-destination').value = tripData.destination;
            document.getElementById('input-date').value = tripData.date;
        }

        function updateCountdown() {
            if (!tripData.date) return;
            const target = new Date(tripData.date + "T00:00:00").getTime();
            const diff = target - new Date().getTime();
            if (diff <= 0) { document.getElementById("timer").innerText = "¡Buen viaje! ✈️"; return; }
            const d = Math.floor(diff / 864e5), h = Math.floor((diff % 864e5) / 36e5), m = Math.floor((diff % 36e5) / 6e4), s = Math.floor((diff % 6e4) / 1e3);
            document.getElementById("timer").innerText = `${d}d ${h}h ${m}m ${s}s`;
        }

        // Inicialización General
        const stateSelect = document.getElementById('state-select');
        Object.keys(taxData).sort().forEach(s => {
            let opt = document.createElement('option');
            opt.value = s; opt.text = s;
            if(s === "Florida") opt.selected = true;
            stateSelect.appendChild(opt);
        });

        window.toggleSettings = () => {
            const d = document.getElementById('settingsDrawer');
            document.getElementById('menuOverlay').style.display = d.classList.toggle('open') ? 'block' : 'none';
        };

        window.openTripModal = () => document.getElementById('tripModal').style.display = 'flex';
        window.closeTripModal = () => document.getElementById('tripModal').style.display = 'none';
        window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));

        window.onload = () => { 
            window.loadCities(); 
            setInterval(updateCountdown, 1000); 
            document.getElementById('tip-content').innerText = econTips[Math.floor(Math.random() * econTips.length)];
        };
    </script>
</body> 
</html>
