<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Taxes USA</title>
    <style>
        :root { --primary: #7c3aed; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); }
        
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.3rem; font-weight: 900; margin: 0; background: linear-gradient(135deg, #7c3aed, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .settings-trigger { background: #f1f5f9; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .tax-card { background: var(--white); width: 100%; max-width: 400px; padding: 20px; border-radius: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; color: #64748b; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #f1f5f9; font-size: 1rem; font-weight: 600; outline: none; transition: 0.2s; background: white; }
        input:focus, select:focus { border-color: var(--primary); }

        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .cat-btn { background: #f1f5f9; border: 2px solid transparent; padding: 12px; border-radius: 15px; font-size: 0.7rem; font-weight: 800; cursor: pointer; text-align: center; }
        .cat-btn.active { background: #ede9fe; border-color: var(--primary); color: var(--primary); }

        .result-box { background: linear-gradient(135deg, #7c3aed, #2563eb); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-top: 10px; }
        .result-val { font-size: 1.8rem; font-weight: 900; }

        .grid-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-top: 10px; }
        .nav-card { background: var(--white); padding: 15px; border-radius: 20px; text-align: center; text-decoration: none; color: var(--text); font-weight: 800; font-size: 0.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

        /* Ajustes Drawer */
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .settings-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 1001; transition: 0.3s; padding: 25px; display: flex; flex-direction: column; }
        .settings-drawer.open { right: 0; }
        .drawer-btn { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: 700; cursor: pointer; font-size: 0.85rem; text-align: left; }

        .footer { margin-top: auto; padding: 20px 0; text-align: center; font-size: 0.7rem; color: #94a3b8; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CALCULADORA TAXES</h1>
        <button class="settings-trigger" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="tax-card">
        <div class="input-group">
            <label>Estado (Selecciona uno)</label>
            <select id="stateSelect" onchange="updateStateTax()">
                <option value="4.0" data-city="Birmingham/Montgomery">Alabama (AL)</option>
                <option value="0.0" data-city="Anchorage/Juneau">Alaska (AK)</option>
                <option value="5.6" data-city="Phoenix/Tucson">Arizona (AZ)</option>
                <option value="6.5" data-city="Little Rock">Arkansas (AR)</option>
                <option value="7.25" data-city="LA/San Francisco">California (CA)</option>
                <option value="2.9" data-city="Denver/Aspen">Colorado (CO)</option>
                <option value="6.35" data-city="Hartford">Connecticut (CT)</option>
                <option value="0.0" data-city="Wilmington">Delaware (DE)</option>
                <option value="6.0" data-city="Orlando/Miami" selected>Florida (FL)</option>
                <option value="4.0" data-city="Atlanta">Georgia (GA)</option>
                <option value="4.0" data-city="Honolulu">Hawaii (HI)</option>
                <option value="6.0" data-city="Boise">Idaho (ID)</option>
                <option value="6.25" data-city="Chicago">Illinois (IL)</option>
                <option value="7.0" data-city="Indianapolis">Indiana (IN)</option>
                <option value="6.0" data-city="Des Moines">Iowa (IA)</option>
                <option value="6.5" data-city="Wichita">Kansas (KS)</option>
                <option value="6.0" data-city="Louisville">Kentucky (KY)</option>
                <option value="4.45" data-city="New Orleans">Louisiana (LA)</option>
                <option value="5.5" data-city="Portland">Maine (ME)</option>
                <option value="6.0" data-city="Baltimore">Maryland (MD)</option>
                <option value="6.25" data-city="Boston">Massachusetts (MA)</option>
                <option value="6.0" data-city="Detroit">Michigan (MI)</option>
                <option value="6.875" data-city="Minneapolis">Minnesota (MN)</option>
                <option value="7.0" data-city="Jackson">Mississippi (MS)</option>
                <option value="4.225" data-city="St. Louis">Missouri (MO)</option>
                <option value="0.0" data-city="Billings">Montana (MT)</option>
                <option value="5.5" data-city="Omaha">Nebraska (NE)</option>
                <option value="6.85" data-city="Las Vegas">Nevada (NV)</option>
                <option value="0.0" data-city="Manchester">New Hampshire (NH)</option>
                <option value="6.625" data-city="Jersey City/Newark">New Jersey (NJ)</option>
                <option value="5.125" data-city="Albuquerque">New Mexico (NM)</option>
                <option value="4.0" data-city="NYC/Buffalo">New York (NY)</option>
                <option value="4.75" data-city="Charlotte">North Carolina (NC)</option>
                <option value="5.0" data-city="Fargo">North Dakota (ND)</option>
                <option value="5.75" data-city="Columbus/Cleveland">Ohio (OH)</option>
                <option value="4.5" data-city="Oklahoma City">Oklahoma (OK)</option>
                <option value="0.0" data-city="Portland/Salem">Oregon (OR)</option>
                <option value="6.0" data-city="Philadelphia">Pennsylvania (PA)</option>
                <option value="7.0" data-city="Providence">Rhode Island (RI)</option>
                <option value="6.0" data-city="Charleston">South Carolina (SC)</option>
                <option value="4.5" data-city="Sioux Falls">South Dakota (SD)</option>
                <option value="7.0" data-city="Nashville/Memphis">Tennessee (TN)</option>
                <option value="6.25" data-city="Houston/Dallas">Texas (TX)</option>
                <option value="6.1" data-city="Salt Lake City">Utah (UT)</option>
                <option value="6.0" data-city="Burlington">Vermont (VT)</option>
                <option value="5.3" data-city="Virginia Beach">Virginia (VA)</option>
                <option value="6.5" data-city="Seattle">Washington (WA)</option>
                <option value="6.0" data-city="Charleston">West Virginia (WV)</option>
                <option value="5.0" data-city="Milwaukee">Wisconsin (WI)</option>
                <option value="4.0" data-city="Cheyenne">Wyoming (WY)</option>
            </select>
            <div id="cityDisplay" style="font-size: 0.65rem; color: var(--primary); font-weight: 800; margin-top: 5px;">Ciudad Ref: Orlando/Miami</div>
        </div>

        <div class="input-group">
            <label>Precio Etiqueta (USD)</label>
            <input type="number" id="priceInput" placeholder="0.00" oninput="calculateTax()">
        </div>

        <label>Tipo de Compra</label>
        <div class="category-grid">
            <div class="cat-btn active" onclick="setCategory(0, this)">👕 ROPA</div>
            <div class="cat-btn" onclick="setCategory(0, this)">📱 ELECTRONICA</div>
            <div class="cat-btn" onclick="setCategory(0.5, this)">🧴 VARIOS</div>
            <div class="cat-btn" onclick="setCategory(6.0, this)">🏨 HOTEL</div>
        </div>

        <div class="result-box">
            <div style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; opacity: 0.9;">Total Estimado</div>
            <div class="result-val" id="totalOutput">USD 0.00</div>
            <div style="font-size: 0.65rem; margin-top: 5px; opacity: 0.8;" id="taxDetail">Tax: 6.5%</div>
        </div>
    </div>

    <div class="grid-nav">
        <a href="itinerario.html" class="nav-card">📍 ITINERARIO</a>
        <a href="compras.html" class="nav-card">🛍️ COMPRAS</a>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleSettings()"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <h3 style="color:var(--primary); margin-top: 0;">Ajustes</h3>
        <p id="userEmail" style="font-size:0.75rem; color:#64748b; margin-bottom:20px; font-weight:700;"></p>
        <button class="drawer-btn" onclick="logout()">Cerrar Sesión</button>
        <button class="drawer-btn" onclick="resetPassword()">Cambiar Contraseña</button>
        <button class="drawer-btn" style="color: #ef4444; border-color: #fecaca;" onclick="deleteAccount()">Eliminar Cuenta</button>
    </div>

    <div class="footer">
        <span>Creado por Juan Cruz Bria <img src="https://flagcdn.com/w40/ar.png" style="width:15px; vertical-align: middle;"></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail, deleteUser } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U", authDomain: "viajes-db538.firebaseapp.com", projectId: "viajes-db538", storageBucket: "viajes-db538.firebasestorage.app", messagingSenderId: "237311739178", appId: "1:237311739178:web:333e468b184c0402a98a53" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let baseTax = 6.5;
        let extraTax = 0;
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.replace("login.html");
            else {
                currentUser = user;
                document.getElementById('userEmail').innerText = user.email;
            }
        });

        window.updateStateTax = () => {
            const select = document.getElementById('stateSelect');
            baseTax = parseFloat(select.value);
            const city = select.options[select.selectedIndex].getAttribute('data-city');
            document.getElementById('cityDisplay').innerText = `Ciudad Ref: ${city}`;
            calculateTax();
        };

        window.setCategory = (extra, btn) => {
            extraTax = extra;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            calculateTax();
        };

        window.calculateTax = () => {
            const price = parseFloat(document.getElementById('priceInput').value) || 0;
            const finalRate = baseTax + extraTax;
            const total = price + (price * (finalRate / 100));
            document.getElementById('totalOutput').innerText = `USD ${total.toFixed(2)}`;
            document.getElementById('taxDetail').innerText = `Tax: ${finalRate.toFixed(2)}%`;
        };

        window.toggleSettings = () => {
            const d = document.getElementById('settingsDrawer');
            const overlay = document.getElementById('menuOverlay');
            const isOpen = d.classList.toggle('open');
            overlay.style.display = isOpen ? 'block' : 'none';
        };

        window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));
        window.resetPassword = () => {
            if (currentUser) {
                sendPasswordResetEmail(auth, currentUser.email).then(() => alert("¡Correo enviado!")).catch(e => alert(e.message));
            }
        };
        window.deleteAccount = () => {
            if(confirm("¿Borrar cuenta definitivamente?")) {
                deleteUser(currentUser).then(() => window.location.replace("login.html")).catch(() => alert("Re-inicia sesión primero."));
            }
        };

        // Inicializar cálculo
        window.onload = () => calculateTax();
    </script>
</body>
</html>
