<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxUSA</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        .card { 
            background: var(--card); 
            padding: 1.8rem; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center;
        }
        h1 { margin: 0 0 1.5rem 0; font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: 800; color: #64748b; margin-bottom: 0.5rem; margin-left: 5px; text-transform: uppercase; }
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #f1f5f9; 
            border-radius: 16px; 
            font-size: 1rem; 
            font-weight: 600; 
            outline: none; 
            background: white;
        }
        input:focus, select:focus { border-color: var(--primary); }
        .result-box { 
            background: #eff6ff; 
            padding: 1.5rem; 
            border-radius: 22px; 
            margin-top: 1rem; 
            border: 1px dashed var(--primary);
        }
        .result-label { font-size: 0.7rem; font-weight: 800; color: #3b82f6; text-transform: uppercase; }
        .result-value { font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 5px 0; }
        .btn-link {
            margin-top: 20px;
            display: block;
            text-decoration: none;
            color: #64748b;
            font-weight: 800;
            font-size: 0.85rem;
            padding: 15px;
            border-radius: 16px;
            background: #f1f5f9;
        }
        .state-tag { font-size: 0.65rem; font-weight: 800; color: #94a3b8; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TaxUSA 🇺🇸</h1>
        
        <div class="input-group">
            <label>Precio Etiqueta (USD)</label>
            <input type="number" id="price" placeholder="0.00" oninput="calculate()" step="0.01">
        </div>

        <div class="input-group">
            <label>Estado / Región</label>
            <select id="state-select" onchange="updateTax()">
                <option value="6.5">Orlando, FL (6.5%)</option>
                <option value="7.0">Miami, FL (7.0%)</option>
                <option value="4.0">Alabama (4.0%)</option>
                <option value="0.0">Alaska (0%)</option>
                <option value="5.6">Arizona (5.6%)</option>
                <option value="6.5">Arkansas (6.5%)</option>
                <option value="7.25">California (7.25%)</option>
                <option value="2.9">Colorado (2.9%)</option>
                <option value="6.35">Connecticut (6.35%)</option>
                <option value="0.0">Delaware (0%)</option>
                <option value="6.0">Florida - Base (6.0%)</option>
                <option value="4.0">Georgia (4.0%)</option>
                <option value="4.0">Hawaii (4.0%)</option>
                <option value="6.0">Idaho (6.0%)</option>
                <option value="6.25">Illinois (6.25%)</option>
                <option value="7.0">Indiana (7.0%)</option>
                <option value="6.0">Iowa (6.0%)</option>
                <option value="6.5">Kansas (6.5%)</option>
                <option value="6.0">Kentucky (6.0%)</option>
                <option value="4.45">Louisiana (4.45%)</option>
                <option value="5.5">Maine (5.5%)</option>
                <option value="6.0">Maryland (6.0%)</option>
                <option value="6.25">Massachusetts (6.25%)</option>
                <option value="6.0">Michigan (6.0%)</option>
                <div class="size-row"></div>
                <option value="6.875">Minnesota (6.875%)</option>
                <option value="7.0">Mississippi (7.0%)</option>
                <option value="4.225">Missouri (4.225%)</option>
                <option value="0.0">Montana (0%)</option>
                <option value="5.5">Nebraska (5.5%)</option>
                <option value="6.85">Nevada (6.85%)</option>
                <option value="0.0">New Hampshire (0%)</option>
                <option value="6.625">New Jersey (6.625%)</option>
                <option value="5.125">New Mexico (5.125%)</option>
                <option value="4.0">New York State (4.0%)</option>
                <option value="8.875">New York City (8.875%)</option>
                <option value="4.75">North Carolina (4.75%)</option>
                <option value="5.0">North Dakota (5.0%)</option>
                <option value="5.75">Ohio (5.75%)</option>
                <option value="4.5">Oklahoma (4.5%)</option>
                <option value="0.0">Oregon (0%)</option>
                <option value="6.0">Pennsylvania (6.0%)</option>
                <option value="7.0">Rhode Island (7.0%)</option>
                <option value="6.0">South Carolina (6.0%)</option>
                <option value="4.5">South Dakota (4.5%)</option>
                <option value="7.0">Tennessee (7.0%)</option>
                <option value="6.25">Texas (6.25%)</option>
                <option value="6.1">Utah (6.1%)</option>
                <option value="6.0">Vermont (6.0%)</option>
                <option value="5.3">Virginia (5.3%)</option>
                <option value="6.5">Washington (6.5%)</option>
                <option value="6.0">West Virginia (6.0%)</option>
                <option value="5.0">Wisconsin (5.0%)</option>
                <option value="4.0">Wyoming (4.0%)</option>
                <option value="custom">Otro (Manual)</option>
            </select>
        </div>

        <div class="input-group" id="custom-tax-group" style="display:none;">
            <label>Tax Manual (%)</label>
            <input type="number" id="tax" value="6.5" oninput="calculate()" step="0.001">
        </div>

        <div class="result-box">
            <div class="result-label">Total Final</div>
            <div class="result-value" id="total">USD 0.00</div>
        </div>

        <span class="state-tag" id="current-tax-label">Tax aplicado: 6.5%</span>

        <a href="compras.html" class="btn-link">Ir a Shopping Orlando →</a>
    </div>

    <script>
        function updateTax() {
            const select = document.getElementById('state-select');
            const taxInput = document.getElementById('tax');
            const customGroup = document.getElementById('custom-tax-group');

            if (select.value === "custom") {
                customGroup.style.display = "block";
            } else {
                customGroup.style.display = "none";
                taxInput.value = select.value;
            }
            calculate();
        }

        function calculate() {
            const price = parseFloat(document.getElementById('price').value) || 0;
            const tax = parseFloat(document.getElementById('tax').value) || 0;
            const total = price + (price * (tax / 100));
            
            document.getElementById('total').innerText = 'USD ' + total.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            document.getElementById('current-tax-label').innerText = `Tax aplicado: ${tax}%`;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
