<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxUSA Pro Smart</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e40af">
    <style>
        :root { --primary: #1e40af; --success: #15803d; --warning: #b45309; --bg: #f1f5f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .nav-bar { width: 100%; max-width: 450px; margin-bottom: 15px; }
        .btn-nav { width: 100%; padding: 12px; background: #fff; border: 2px solid var(--primary); color: var(--primary); border-radius: 14px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; text-decoration: none; }
        .card { background: #fff; padding: 1.5rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border: 1px solid #e2e8f0; }
        h2 { margin: 0 0 1.2rem 0; text-align: center; color: var(--primary); font-weight: 800; }
        .field { margin-bottom: 0.8rem; }
        label { display: block; margin-bottom: 4px; font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 1rem; background: #f8fafc; }
        .alert-tax { background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; padding: 10px; border-radius: 12px; font-size: 0.75rem; margin-bottom: 12px; display: none; }
        .result-box { margin: 1.2rem 0; padding: 1.5rem; background: #f0fdf4; border-radius: 20px; text-align: center; border: 1px solid #dcfce7; }
        .total-price { font-size: 2.8rem; font-weight: 900; color: var(--success); }
        button.main-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 1rem; background-color: var(--primary); color: white; }
        .history-item { background: white; padding: 15px; border-radius: 16px; margin-top: 10px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 450px; }
        .item-info { font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="compras.html" class="btn-nav">
        <span>💰 IR A MI PRESUPUESTO Y TALLES</span>
    </a>
</div>

<div class="card">
    <h2>TaxUSA Smart 🇺🇸</h2>
    <div id="tax-alert" class="alert-tax"></div>
    <div class="field"><label>Producto</label><input type="text" id="nombreItem" placeholder="Ej: Zapatillas, iPhone..."></div>
    <div class="field">
        <label>Categoría</label>
        <select id="categoria" onchange="calcular()">
            <option value="general">General (Electrónica)</option>
            <option value="ropa">Ropa y Calzado</option>
            <option value="comida">Comestibles (Supermercado)</option>
            <option value="medicina">Medicina / Salud</option>
        </select>
    </div>
    <div style="display: flex; gap: 10px;">
        <div class="field" style="flex: 2;"><label>Precio Base</label><input type="number" id="psi" placeholder="0.00" oninput="calcular()"></div>
        <div class="field" style="flex: 1;"><label>Tax %</label><input type="number" id="pci" step="0.01" oninput="calcular()"></div>
    </div>
    <div class="field"><label>Estado</label><select id="estado" onchange="cargarCiudades()"></select></div>
    <div class="field" id="contenedor-ciudad" style="display:none;"><label>Ciudad</label><select id="ciudad" onchange="actualizarTax()"></select></div>
    
    <div class="result-box">
        <div class="total-price" id="total">USD 0.00</div>
        <div id="detalle" style="font-size: 0.8rem; color: #166534; font-weight: 500;"></div>
    </div>
    <button class="main-btn" onclick="guardar()">GUARDAR EN HISTORIAL</button>
</div>

<div id="lista-historial" style="width: 100%; max-width: 450px; margin-top: 20px;"></div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }

    const dbTax = {
        "Alabama": {"Birmingham": 10.0}, "Alaska": {"Anchorage": 0.0}, "Arizona": {"Phoenix": 8.6}, 
        "California": {"LA": 9.5, "SF": 8.62, "San Diego": 7.75}, "Delaware": {"Sin Tax": 0.0}, 
        "Florida": {"Orlando": 6.5, "Miami": 7.0, "Tampa": 7.5, "Fort Lauderdale": 7.0}, "Georgia": {"Atlanta": 8.9}, 
        "Illinois": {"Chicago": 10.25}, "Nevada": {"Las Vegas": 8.37}, "New Jersey": {"Jersey City": 6.62}, 
        "New York": {"NYC": 8.875, "Buffalo": 8.75}, "Pennsylvania": {"Philly": 8.0}, 
        "Texas": {"Houston": 8.25, "Dallas": 8.25, "Austin": 8.25}, "Washington": {"Seattle": 10.25}
    };

    function calcular() {
        const p = parseFloat(document.getElementById('psi').value) || 0;
        let t = parseFloat(document.getElementById('pci').value) || 0;
        
        // Redondeo a 2 dígitos después de la coma para el %
        t = Math.round(t * 100) / 100;
        document.getElementById('pci').value = t;

        const e = document.getElementById('estado').value;
        const c = document.getElementById('categoria').value;
        const alertBox = document.getElementById('tax-alert');
        let msg = "";

        if(c === "comida" && ["Florida", "California", "Texas", "New York", "Pennsylvania"].includes(e)) { t = 0; msg = "Comida exenta en " + e; }
        else if(c === "ropa" && (e === "Pennsylvania" || e === "New Jersey")) { t = 0; msg = "Ropa exenta en " + e; }
        else if(c === "ropa" && e === "New York" && p < 110) { t = 4.38; msg = "Ropa < $110 en NY: Tax reducido."; }
        else if(c === "medicina") { t = 0; msg = "Medicina exenta."; }

        alertBox.innerText = msg; alertBox.style.display = msg ? "block" : "none";
        
        const total = p * (1 + (t/100));
        document.getElementById('total').innerText = 'USD ' + total.toLocaleString('en-US', {minimumFractionDigits: 2});
        document.getElementById('detalle').innerText = p > 0 ? `Tax Final: ${t.toFixed(2)}% (+ $${(total-p).toFixed(2)})` : "";
    }

    function init() {
        const selE = document.getElementById('estado');
        selE.add(new Option("Seleccionar Estado...", ""));
        Object.keys(dbTax).sort().forEach(e => selE.add(new Option(e, e)));
        mostrar();
    }

    function cargarCiudades() {
        const e = document.getElementById('estado').value;
        const selC = document.getElementById('ciudad');
        selC.innerHTML = '';
        if(e && dbTax[e]) {
            document.getElementById('contenedor-ciudad').style.display = 'block';
            Object.keys(dbTax[e]).forEach(c => {
                // Redondeo de los valores de la base de datos al cargar
                let taxVal = Math.round(dbTax[e][c] * 100) / 100;
                selC.add(new Option(`${c} (${taxVal.toFixed(2)}%)`, taxVal));
            });
            actualizarTax();
        }
    }

    function actualizarTax() { 
        let val = parseFloat(document.getElementById('ciudad').value);
        document.getElementById('pci').value = val.toFixed(2); 
        calcular(); 
    }
    
    function guardar() {
        const p = document.getElementById('psi').value;
        if(!p) return;
        const h = JSON.parse(localStorage.getItem('taxAppVFinal')) || [];
        h.unshift({ n: document.getElementById('nombreItem').value || "Item", t: document.getElementById('total').innerText, m: document.getElementById('estado').value });
        localStorage.setItem('taxAppVFinal', JSON.stringify(h.slice(0, 5)));
        mostrar();
    }

    function mostrar() {
        const h = JSON.parse(localStorage.getItem('taxAppVFinal')) || [];
        document.getElementById('lista-historial').innerHTML = h.map(i => `<div class="history-item"><div class="item-info"><b>${i.n}</b><br><small>${i.m}</small></div><div style="font-weight:800; color:var(--success);">${i.t}</div></div>`).join('');
    }

    init();
</script>
</body>
</html>
