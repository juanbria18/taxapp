<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compras y Talles</title>
    <style>
        :root { --primary: #2563eb; --accent: #7c3aed; --bg: #f8fafc; --white: #ffffff; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .nav-bar { width: 100%; max-width: 450px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .btn-nav { flex: 1; padding: 12px; background: var(--white); border-radius: 14px; font-weight: 800; text-align: center; text-decoration: none; font-size: 0.8rem; border: 2px solid var(--primary); color: var(--primary); }
        
        /* Botón de ajustes corregido */
        .settings-trigger { background: #f1f5f9; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        .budget-card { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; padding: 20px; border-radius: 24px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2); margin-bottom: 15px; }
        .budget-value { font-size: 2.2rem; font-weight: 900; margin: 8px 0; }
        .set-budget { display: flex; gap: 8px; margin-top: 12px; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 15px; }
        .set-budget input { flex: 1; background: transparent; border: none; color: white; padding: 5px 10px; font-weight: 700; outline: none; width: 60px; }
        .set-budget button { background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 0.7rem; }

        .card { background: var(--white); padding: 1.5rem; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tab-container { display: flex; background: #f1f5f9; padding: 5px; border-radius: 16px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; background: transparent; color: #64748b; font-size: 0.8rem; }
        .tab.active { background: var(--white); color: var(--primary); }

        .history-item { background: #f8fafc; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .btn-add { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 800; font-size: 0.9rem; cursor: pointer; }
        
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .settings-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 1001; transition: 0.3s; padding: 25px; }
        .settings-drawer.open { right: 0; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="btn-nav">🏠 INICIO</a>
        <a href="itinerario.html" class="btn-nav">📍 ITINERARIO</a>
        <button class="settings-trigger" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="budget-card">
        <div style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">Presupuesto Restante</div>
        <div class="budget-value" id="disp-fondo">USD 0.00</div>
        <div class="set-budget">
            <input type="number" id="input-fondo" placeholder="Total USD">
            <button onclick="updateFondo()">SET</button>
        </div>
    </div>

    <div class="card">
        <div class="tab-container">
            <button class="tab active" onclick="showSec('gastos')" id="t-gastos">GASTOS</button>
            <button class="tab" onclick="showSec('talles')" id="t-talles">TALLES</button>
        </div>

        <div id="sec-gastos">
            <input type="text" id="nombre" placeholder="Producto" style="width:100%; padding:14px; margin-bottom:10px; border-radius:12px; border:2px solid #f1f5f9;">
            <input type="number" id="valor" placeholder="Precio USD" style="width:100%; padding:14px; margin-bottom:10px; border-radius:12px; border:2px solid #f1f5f9;">
            <button class="btn-add" onclick="addGasto()">GUARDAR GASTO</button>
            <div id="listaGastos" style="margin-top:20px;"></div>
        </div>
        
        <div id="sec-talles" style="display:none; text-align:center;">
             <p>👟 Arg 40 -> US 9 | 👕 Arg M -> US S</p>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleSettings()"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <h3>Ajustes</h3>
        <p id="userEmail" style="font-size:0.8rem; color:gray;"></p>
        <button onclick="logout()" style="width:100%; padding:10px; margin-top:20px;">Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U", authDomain: "viajes-db538.firebaseapp.com", projectId: "viajes-db538", storageBucket: "viajes-db538.firebasestorage.app", messagingSenderId: "237311739178", appId: "1:237311739178:web:333e468b184c0402a98a53" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;
        let presupuestoBase = 0;

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.replace("login.html");
            else {
                currentUser = user;
                document.getElementById('userEmail').innerText = user.email;
                onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
                    presupuestoBase = docSnap.exists() ? (docSnap.data().fondo || 0) : 0;
                    listenGastos(user.uid);
                }, (error) => { console.error("Error de permisos:", error); });
            }
        });

        function listenGastos(uid) {
            const q = query(collection(db, "compras"), where("userId", "==", uid), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('listaGastos');
                let totalGastado = 0;
                container.innerHTML = snapshot.docs.map(docSnap => {
                    const d = docSnap.data();
                    totalGastado += parseFloat(d.valor);
                    return `<div class="history-item"><b>${d.nombre}</b> <span>-$${d.valor}</span></div>`;
                }).join('');
                document.getElementById('disp-fondo').innerText = 'USD ' + (presupuestoBase - totalGastado).toFixed(2);
            });
        }

        window.updateFondo = async () => {
            const val = document.getElementById('input-fondo').value;
            if(val) await setDoc(doc(db, "usuarios", currentUser.uid), { fondo: parseFloat(val) }, { merge: true });
        };

        window.addGasto = async () => {
            const n = document.getElementById('nombre').value;
            const v = document.getElementById('valor').value;
            if(n && v) await addDoc(collection(db, "compras"), { nombre: n, valor: parseFloat(v), userId: currentUser.uid, createdAt: Date.now() });
        };

        window.showSec = (s) => {
            document.getElementById('sec-gastos').style.display = s === 'gastos' ? 'block' : 'none';
            document.getElementById('sec-talles').style.display = s === 'talles' ? 'block' : 'none';
        };

        window.toggleSettings = () => {
            const d = document.getElementById('settingsDrawer');
            document.getElementById('menuOverlay').style.display = d.classList.toggle('open') ? 'block' : 'none';
        };

        window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));
    </script>
</body>
</html>
