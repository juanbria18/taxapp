        :root {

            --radius:20px; --radius-sm:12px;
            --shadow:0 4px 20px rgba(0,0,0,0.06); --shadow-lg:0 12px 40px rgba(0,0,0,0.1);

        }

            --bg:#0f172a; --surface:#1e293b; --surface-2:#273549;
            --border:#334155; --input-bg:#273549;
            --text:#f1f5f9; --text-sub:#94a3b8; --text-dim:#64748b;

            --shadow:0 4px 20px rgba(0,0,0,0.3); --shadow-lg:0 12px 40px rgba(0,0,0,0.4);

        *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
        body{font-family:'DM Sans',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 16px 40px;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;}
        .wrap{width:100%;max-width:460px;}
        .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
        .logo{display:flex;align-items:center;gap:10px;font-size:1.4rem;font-weight:900;color:var(--header-color);letter-spacing:-.5px;}
        .logo svg{width:28px;height:28px;flex-shrink:0;}
        .nav-bar{display:flex;align-items:center;background:var(--surface);border-radius:16px;padding:6px;margin-bottom:16px;border:1px solid var(--border);box-shadow:var(--shadow);gap:2px;}
        .btn-nav{flex:1;display:flex;flex-direction:column;align-items:center;text-decoration:none;color:var(--text-sub);font-size:8px;font-weight:700;gap:2px;padding:6px 2px;border-radius:10px;background:none;border:none;cursor:pointer;transition:var(--tr);text-transform:uppercase;letter-spacing:.3px;}
        .btn-nav .ni{font-size:17px;line-height:1;}
        .btn-nav:hover,.btn-nav.active{color:var(--primary);background:var(--primary-dim);}
        .btn-nav-set{width:34px;height:34px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;overflow:hidden;transition:var(--tr);background-size:cover;background-position:center;}
        .btn-nav-set:hover{border-color:var(--primary);}
        .card{background:var(--surface);border-radius:var(--radius);padding:20px;width:100%;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:14px;position:relative;}
        .slabel{font-size:.6rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:block;}
        select, textarea, input{width:100%;padding:14px 16px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:.9rem;font-weight:600;outline:none;transition:var(--tr);-webkit-appearance:none;margin-bottom:12px;}
        select:focus, textarea:focus, input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-dim);}
        .queues-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
        .queue-card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;display:flex;flex-direction:column;gap:4px;transition:var(--tr);}
        .queue-name{font-size:.65rem;font-weight:800;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px;}
        .queue-status{font-size:.85rem;font-weight:900;}
        .q-low{color:var(--success);} .q-med{color:var(--warn);} .q-high{color:var(--danger);} .q-off{color:var(--text-dim);}
        .smart-tip{background:var(--primary-dim);border:1.5px solid var(--primary);border-radius:var(--radius-sm);padding:13px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
        .st-icon{font-size:1.1rem;flex-shrink:0;}
        .st-label{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--primary);margin-bottom:3px;}
        #tip-text{font-size:.8rem;font-weight:600;color:var(--text);line-height:1.4;transition:opacity .3s;}
        .btn-primary{width:100%;padding:15px;background:var(--primary);color:white;border:none;border-radius:var(--radius-sm);font-weight:800;font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:var(--tr);box-shadow:0 4px 14px rgba(124,58,237,.3);}
        .btn-primary:active{transform:scale(.97);}
        .note-item{background:var(--surface-2);padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;border-left:4px solid var(--primary);}
        .note-text{font-size:.9rem;font-weight:600;flex:1;margin-right:10px;}
        .note-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem;line-height:1;}
        .app-footer{margin-top:8px;padding:12px 0;text-align:center;font-size:.7rem;color:var(--text-dim);font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;}
        .app-footer img{width:16px;border-radius:2px;}
        .api-note{font-size:.55rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;opacity:.6;text-align:center;margin-top:4px;}
        .menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:1000;backdrop-filter:blur(4px);}
        .settings-drawer{position:fixed;top:0;right:-300px;width:290px;height:100%;background:var(--surface);z-index:1001;transition:.3s ease;padding:28px 20px;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.15);border-left:1px solid var(--border);overflow-y:auto;}
        .settings-drawer.open{right:0;}
        .drawer-header{font-size:1.1rem;font-weight:900;color:var(--primary);margin-bottom:4px;}
        .drawer-email{font-size:.75rem;color:var(--text-dim);font-weight:600;margin-bottom:20px;}
        .drawer-btn{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);cursor:pointer;font-weight:700;margin-bottom:8px;font-size:.85rem;text-align:left;font-family:inherit;transition:var(--tr);display:flex;align-items:center;gap:10px;}
        .lang-selector{display:flex;background:var(--input-bg);border-radius:var(--radius-sm);padding:4px;gap:4px;margin-bottom:14px;border:1.5px solid var(--border);}
        .lang-opt{flex:1;padding:8px 4px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:.75rem;font-weight:800;color:var(--text-sub);display:flex;align-items:center;justify-content:center;gap:6px;}
        .lang-opt.active{background:var(--primary);color:white;}
        .lang-opt img{width:18px;border-radius:2px;}

   window.changeLanguage = (lang) => {
        localStorage.setItem('appLang', lang);
        document.documentElement.setAttribute('lang', lang);
        document.querySelectorAll('.lang-opt').forEach(opt => opt.classList.remove('active'));
        document.getElementById('lang-' + lang)?.classList.add('active');
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[lang]?.[key]) el.innerText = i18n[lang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (i18n[lang]?.[key]) el.placeholder = i18n[lang][key];
        });
        const tipEl = document.getElementById('tip-text');
        if (tipEl) tipEl.innerText = tips[lang][currentTipIndex];
        document.title = lang === 'en' ? 'TaxUSA — Itinerary' : 'TaxUSA — Itinerario';
        renderCityData();
    };

    window.nextTip = () => {
        const lang = localStorage.getItem('appLang') || 'es';
        const el = document.getElementById('tip-text');
        if (!el) return;
        el.style.opacity = 0;
        setTimeout(() => {
            currentTipIndex = (currentTipIndex + 1) % tips[lang].length;
            el.innerText = tips[lang][currentTipIndex];
            el.style.opacity = 1;
        }, 300);
    };

    window.renderCityData = async () => {
        const cityKey = document.getElementById('citySelector').value;
        const container = document.getElementById('dynamicQueues');
        const cityData = citiesConfig[cityKey];
        container.innerHTML = cityData.spots.map((s, i) => `
            <div class="queue-card">
                <div class="queue-name">${s.name}</div>
                <div id="spot-${i}" class="queue-status">...</div>
            </div>
        `).join('');
        // Cargar filas de parques después del render inicial para no bloquear UI
        if (typeof requestIdleCallback !== 'undefined') {
            requestIdleCallback(() => updateStatusDisplay(cityKey), { timeout: 2000 });
        } else {
            setTimeout(() => updateStatusDisplay(cityKey), 150);
        }
    };

    async function updateStatusDisplay(cityKey) {
        const cityData = citiesConfig[cityKey];
        const lang = localStorage.getItem('appLang') || 'es';
        const t = i18n[lang];
        const localHour = parseInt(new Intl.DateTimeFormat("en-US", { timeZone: cityData.tz, hour: "numeric", hour12: false }).format(new Date()));

        for (let i = 0; i < cityData.spots.length; i++) {
            const el = document.getElementById(`spot-${i}`);
            if (!el) continue;
            if (cityKey === 'orlando' && cityData.spots[i].parkId) {
                if (localHour >= 22 || localHour < 8) { el.innerText = t.status_closed; el.className = "queue-status q-off"; }
                else {
                    try {
                        const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(`https://queue-times.com/parks/${cityData.spots[i].parkId}/queue_times.json`), { signal: AbortSignal.timeout(8000) });
                        const data = await res.json();
                        let tot = 0, c = 0;
                        data.lands?.forEach(l => l.rides.forEach(r => { if(r.is_open){ tot += r.wait_time; c++; } }));
                        const avg = c > 0 ? tot / c : 0;
                        if (avg <= 20) { el.innerText = t.status_low; el.className = "queue-status q-low"; }
                        else if (avg <= 45) { el.innerText = t.status_med; el.className = "queue-status q-med"; }
                        else { el.innerText = t.status_high; el.className = "queue-status q-high"; }
                    } catch(e) { el.innerText = t.status_na; el.className = "queue-status q-off"; }
                }
            } else {
                if (localHour >= 23 || localHour < 7) { el.innerText = t.status_closed; el.className = "queue-status q-off"; }
                else if (localHour >= 12 && localHour <= 19) { el.innerText = t.status_high; el.className = "queue-status q-high"; }
                else if (localHour >= 9 && localHour < 12) { el.innerText = t.status_med; el.className = "queue-status q-med"; }
                else { el.innerText = t.status_low; el.className = "queue-status q-low"; }
            }
        }
    }

    window.addNote = async () => {
        const input = document.getElementById('noteInput');
        const text = input.value.trim();
        if (text && currentUser && perfilId) {
            try {
                await addDoc(collection(db, "usuarios", currentUser.uid, "perfiles", perfilId, "notas"), { text, createdAt: Date.now() });
                input.value = "";
            } catch (e) { console.error(e); }
        }
    };

    function listenNotes() {
        if (!currentUser || !perfilId) return;
        const q = query(collection(db, "usuarios", currentUser.uid, "perfiles", perfilId, "notas"), orderBy("createdAt", "desc"));
        onSnapshot(q, (sn) => {
            document.getElementById('notesList').innerHTML = sn.docs.map(d => `
                <div class="note-item">
                    <div class="note-text">${d.data().text}</div>
                    <button class="note-del" onclick="window.deleteNote('${d.id}')">✕</button>
                </div>
            `).join('');
        });
    }

    window.deleteNote = async (id) => {
        if (confirm('¿Eliminar?')) await deleteDoc(doc(db, "usuarios", currentUser.uid, "perfiles", perfilId, "notas", id));
    };

    window.toggleSettings = () => {
        const d = document.getElementById('settingsDrawer');
        const open = d.classList.toggle('open');
        document.getElementById('menuOverlay').style.display = open ? 'block' : 'none';
    };
    window.toggleDarkMode = () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const next = isDark ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    };
    window.changeProfile = () => { localStorage.removeItem('perfilActivoId'); window.location.href = "profiles.html"; };
    window.doLogout = () => signOut(auth).then(() => window.location.replace("login.html"));

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            if (!perfilId) { window.location.replace("profiles.html"); return; }
            const perfilNombre = localStorage.getItem('perfilActivoNombre');
document.getElementById('userEmail').innerText = perfilNombre || user.email;
            const img = perfilFoto || user.photoURL;
            if (img) {
                const btn = document.getElementById('btnSettings');
                btn.style.backgroundImage = `url(${img})`;
                btn.innerText = '';
            }
            try {
                const snap = await getDoc(doc(db, "usuarios", user.uid, "perfiles", perfilId));
                if (snap.exists() && snap.data().destino) {
                    document.getElementById('citySelector').value = snap.data().destino.toLowerCase();
                }
            } catch (e) {}
            renderCityData();
            listenNotes();
            window.changeLanguage(localStorage.getItem('appLang') || 'es');
            setInterval(window.nextTip, 8000);
        } else { window.location.replace("login.html"); }
    });

        : 'You are Taxie, a USA travel assistant who talks like a friend who has been there a dozen times. Give real, practical advice — not textbook answers. Use bullet points (• ) and **bold** when it helps, but sometimes one or two direct sentences beat a list. Never start with filler phrases like \'Of course!\' or \'Great question!\'. Only answer about USA travel. If asked something unrelated, redirect naturally.';

        for (var i = 0; i < lines.length; i++) {

                if (!inList) { result.push('<ul>'); inList = true; }

    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
