<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Orlando Pro - Cloud</title>
    <style>
        :root { --primary: #2563eb; --accent: #7c3aed; --bg: #f8fafc; --white: #ffffff; --gray: #94a3b8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .nav-bar { width: 100%; max-width: 450px; margin-bottom: 15px; display: flex; gap: 10px; z-index: 10; }
        .btn-nav { flex: 1; padding: 12px; background: var(--white); border-radius: 14px; font-weight: 800; text-align: center; text-decoration: none; font-size: 0.8rem; border: 2px solid var(--accent); color: var(--accent); }
        
        .card { background: var(--white); padding: 1.5rem; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
        
        /* BOTÓN DE AJUSTES CORREGIDO */
        .settings-trigger { position: absolute; top: 15px; right: 15px; background: #f1f5f9; border: none; border-radius: 50%; width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; z-index: 5; transition: transform 0.2s; }
        .settings-trigger:active { transform: scale(0.9); }

        .dolar-container { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; max-width: 450px; }
        .dolar-box { flex: 1; background: #f0fdf4; border: 1px solid #dcfce7; padding: 10px; border-radius: 16px; text-align: center; }
        .dolar-box b { font-size: 1.1rem; color: #15803d; }

        .budget-box { background: #eff6ff; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 2px dashed var(--primary); }
        .amount { font-size: 2.2rem; font-weight: 900; color: var(--primary); }

        .tabs { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; max-width: 450px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #e2e8f0; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .tab.active { background: var(--primary); color: white; }

        input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; margin-bottom: 10px; font-size: 1rem; outline: none; }
        .btn-blue { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* LISTA DE HISTORIAL CORREGIDA */
        .history-list { margin-top: 20px; width: 100%; display: block !important; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .item-name { font-weight: 600; font-size: 0.9rem; color: #1e293b; }
        .item-price { font-weight: 800; font-size: 0.9rem; color: #ef4444; }

        /* DRAWER DE AJUSTES */
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .settings-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 1001; transition: 0.3s; padding: 25px; display: flex; flex-direction: column; }
        .settings-drawer.open { right: 0; }
        .drawer-btn { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: 700; text-align: left; cursor: pointer; }

        /* ESTILOS DE TALLES */
        .size-section-title { background: #f1f5f9; padding: 8px; border-radius: 8px; margin: 15px 0 8px 0; text-align: center; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        .size-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; text-align: center; }
        .size-header { font-weight: 800; color: #64748b; font-size: 0.6rem; background: #f8fafc; padding: 5px; border: 1px solid #e2e8f0; }
        .size-row { padding: 6px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="btn-nav">🏠 INICIO</a>
        <a href="itinerario.html" class="btn-nav">📍 ITINERARIO</a>
    </div>

    <div class="dolar-container">
        <div class="dolar-box"><span>Oficial</span><b id="val-oficial">...</b></div>
        <div class="dolar-box" style="background:#fffbeb;"><span>Tarjeta</span><b id="val-tarjeta">...</b></div>
    </div>

    <div class="tabs">
        <div id="t-gastos" class="tab active" onclick="showSec('gastos')">GASTOS</div>
        <div id="t-talles" class="tab" onclick="showSec('talles')">TALLES</div>
    </div>

    <div id="sec-gastos" class="card">
        <button class="settings-trigger" onclick="toggleSettings()">⚙️</button>
        
        <div class="budget-box">
            <div class="amount" id="disp-usd">USD 0.00</div>
            <div id="disp-ars" class="amount-ars">ARS $0.00</div>
        </div>

        <div style="display:flex; gap:5px; margin-bottom: 15px;">
            <input type="number" id="input-base" placeholder="Nuevo fondo USD" style="margin-bottom:0;">
            <button id="btnSet" class="btn-blue" onclick="updateBase()" style="width:40%; font-size:0.7rem;">SET FONDO</button>
        </div>
        
        <hr style="border:0; border-top:1px solid #f1f5f9; margin-bottom:15px;">

        <input type="text" id="g-nom" placeholder="¿Qué compraste?">
        <input type="number" id="g-val" placeholder="Precio USD">
        <button id="btnReg" class="btn-blue" onclick="addGasto()">REGISTRAR COMPRA</button>

        <div id="lista-compras" class="history-list"></div>
        
        <button onclick="borrarTodo()" style="background:none; border:none; color:gray; text-decoration:underline; width:100%; margin-top:20px; font-size:0.7rem; cursor:pointer;">Limpiar Historial</button>
    </div>

    <div id="sec-talles" class="card" style="display:none;">
        <h3 style="text-align:center; color: var(--primary);">Guía de Talles US</h3>
        <div class="size-section-title">👟 Calzado</div>
        <div class="size-grid">
            <div class="size-header">AR</div><div class="size-header">US H</div><div class="size-header">US M</div>
            <div class="size-row">40</div><div class="size-row">7.5</div><div class="size-row">9</div>
            <div class="size-row">41</div><div class="size-row">8.5</div><div class="size-row">10</div>
            <div class="size-row">42</div><div class="size-row">9</div><div class="size-row">10.5</div>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleSettings()"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <h3>Ajustes</h3>
        <button class="drawer-btn" onclick="changePass()">📧 Cambiar clave</button>
        <button class="drawer-btn" style="margin-top:auto; color:red;" onclick="logout()">🚪 Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, where, orderBy, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53",
            measurementId: "G-WYF0L0YSYJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let usdTarjeta = 0;
        let fondoActual = 0;

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.replace("login.html");
            currentUser = user;
            syncData(user.uid);
        });

        async function fetchDolar() {
            try {
                const r = await fetch('https://dolarapi.com/v1/dolares/tarjeta');
                const d = await r.json();
                usdTarjeta = d.venta;
                document.getElementById('val-tarjeta').innerText = '$' + usdTarjeta.toFixed(2);
                updateDisplay();
            } catch(e) { console.log("Error API"); }
        }

        function syncData(uid) {
            onSnapshot(doc(db, "usuarios", uid), (docSnap) => {
                fondoActual = docSnap.exists() ? docSnap.data().fondo : 0;
                updateDisplay();
            });

            // ESCUCHA DEL HISTORIAL CORREGIDA
            const q = query(collection(db, "compras"), where("userId", "==", uid), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const lista = document.getElementById('lista-compras');
                if (snap.empty) {
                    lista.innerHTML = '<p style="text-align:center; color:gray; font-size:0.8rem;">No hay compras registradas</p>';
                    return;
                }
                lista.innerHTML = snap.docs.map(d => `
                    <div class="history-item">
                        <span class="item-name">${d.data().nombre}</span>
                        <span class="item-price">- USD ${d.data().precio.toFixed(2)}</span>
                    </div>`).join('');
            });
        }

        window.updateBase = async () => {
            const v = document.getElementById('input-base').value;
            if(!v || !currentUser) return;
            await setDoc(doc(db, "usuarios", currentUser.uid), { fondo: parseFloat(v) }, { merge: true });
            document.getElementById('input-base').value = '';
        };

        window.addGasto = async () => {
            const nom = document.getElementById('g-nom').value || 'Compra';
            const val = parseFloat(document.getElementById('g-val').value);
            if(!val || !currentUser) return;
            const btn = document.getElementById('btnReg');
            btn.disabled = true;
            try {
                await setDoc(doc(db, "usuarios", currentUser.uid), { fondo: fondoActual - val }, { merge: true });
                await addDoc(collection(db, "compras"), { 
                    nombre: nom, 
                    precio: val, 
                    userId: currentUser.uid, 
                    createdAt: Date.now() 
                });
                document.getElementById('g-nom').value = '';
                document.getElementById('g-val').value = '';
            } catch(e) { alert(e.message); }
            btn.disabled = false;
        };

        window.borrarTodo = async () => {
            if(!confirm("¿Borrar historial?")) return;
            const q = query(collection(db, "compras"), where("userId", "==", currentUser.uid));
            const snap = await getDocs(q);
            snap.forEach(d => deleteDoc(doc(db, "compras", d.id)));
        };

        function updateDisplay() {
            document.getElementById('disp-usd').innerText = 'USD ' + fondoActual.toLocaleString('en-US', {minimumFractionDigits:2});
            if(usdTarjeta > 0) document.getElementById('disp-ars').innerText = 'ARS $' + (fondoActual * usdTarjeta).toLocaleString('es-AR', {minimumFractionDigits:2});
        }

        window.showSec = (s) => {
            document.getElementById('sec-gastos').style.display = s==='gastos'?'block':'none';
            document.getElementById('sec-talles').style.display = s==='talles'?'block':'none';
            document.getElementById('t-gastos').classList.toggle('active', s==='gastos');
            document.getElementById('t-talles').classList.toggle('active', s==='talles');
        };

        window.toggleSettings = () => {
            document.getElementById('settingsDrawer').classList.toggle('open');
            document.getElementById('menuOverlay').style.display = document.getElementById('settingsDrawer').classList.contains('open') ? 'block' : 'none';
        };

        window.logout = () => signOut(auth);
        window.changePass = () => sendPasswordResetEmail(auth, currentUser.email).then(() => alert("Mail enviado"));

        fetchDolar();
    </script>
</body>
</html>
