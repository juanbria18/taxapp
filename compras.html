<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compras y Talles</title>
    <style>
        :root { --primary: #2563eb; --accent: #7c3aed; --bg: #f8fafc; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .nav-bar { width: 100%; max-width: 450px; margin-bottom: 15px; display: flex; gap: 10px; }
        .btn-nav { flex: 1; padding: 12px; background: var(--white); border-radius: 14px; font-weight: 800; text-align: center; text-decoration: none; font-size: 0.8rem; border: 2px solid var(--primary); color: var(--primary); }
        
        .budget-card { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; padding: 20px; border-radius: 24px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2); margin-bottom: 15px; }
        .budget-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; opacity: 0.9; letter-spacing: 1px; }
        .budget-value { font-size: 2.2rem; font-weight: 900; margin: 8px 0; }
        .set-budget { display: flex; gap: 8px; margin-top: 12px; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 15px; }
        .set-budget input { flex: 1; background: transparent; border: none; color: white; padding: 5px 10px; font-weight: 700; outline: none; }
        .set-budget input::placeholder { color: rgba(255,255,255,0.6); }
        .set-budget button { background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 0.7rem; cursor: pointer; }

        .card { background: var(--white); padding: 1.5rem; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .tab-container { display: flex; background: #f1f5f9; padding: 5px; border-radius: 16px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; background: transparent; color: #64748b; font-size: 0.8rem; }
        .tab.active { background: var(--white); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .input-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; margin-left: 5px; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 1rem; font-weight: 600; outline: none; }

        .btn-add { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 0.9rem; }

        .history-item { background: #f8fafc; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .h-info b { display: block; font-size: 0.95rem; color: #1e293b; }
        .h-info span { font-size: 0.7rem; color: #94a3b8; font-weight: 700; }
        .h-amount { font-weight: 900; color: var(--primary); font-size: 1rem; }

        /* Talles - Estilo 3 Columnas */
        .talles-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .talle-col { background: #f8fafc; padding: 10px 5px; border-radius: 14px; border: 1px solid #e2e8f0; text-align: center; }
        .talle-col small { color: var(--accent); font-weight: 800; font-size: 0.55rem; display: block; text-transform: uppercase; margin-bottom: 5px; }
        .talle-item { font-weight: 700; font-size: 0.75rem; color: #1e293b; margin-bottom: 4px; display: block; line-height: 1.2; }
        
        .dato-clave { background: #f5f3ff; padding: 15px; border-radius: 16px; border: 1.5px solid var(--accent); margin-top: 10px; text-align: center; }

        .footer { margin-top: auto; padding: 20px 0; text-align: center; font-size: 0.75rem; color: #94a3b8; font-weight: 600; }
        .footer span { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .flag-icon { width: 18px; height: auto; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="btn-nav">🏠 INICIO</a>
        <a href="itinerario.html" class="btn-nav">📍 ITINERARIO</a>
    </div>

    <div class="budget-card">
        <div class="budget-label">Presupuesto Restante</div>
        <div class="budget-value" id="disp-fondo">USD 0.00</div>
        <div class="set-budget">
            <input type="number" id="input-fondo" placeholder="Set Presupuesto (USD)" inputmode="decimal">
            <button onclick="updateFondo()">SET</button>
        </div>
    </div>

    <div class="card">
        <div class="tab-container">
            <button class="tab active" onclick="showSec('gastos')" id="t-gastos">GASTOS</button>
            <button class="tab" onclick="showSec('talles')" id="t-talles">TALLES</button>
        </div>

        <div id="sec-gastos">
            <div class="input-group">
                <label>Nombre del Producto</label>
                <input type="text" id="nombre" placeholder="Ej: Zapatillas Nike">
            </div>
            <div class="input-group">
                <label>Valor en USD</label>
                <input type="number" id="valor" placeholder="0.00" inputmode="decimal">
            </div>
            <button class="btn-add" onclick="addGasto()">GUARDAR GASTO</button>
            
            <div id="listaGastos" style="margin-top:20px;">
                <p style="text-align:center; color:#94a3b8; font-size:0.8rem;">Sincronizando gastos...</p>
            </div>
        </div>

        <div id="sec-talles" style="display:none;">
            <div class="talles-grid-3">
                <div class="talle-col">
                    <small>👟 Calzado</small>
                    <span class="talle-item"><b>H:</b> 9.5 US</span>
                    <span class="talle-item">42.5 ARG</span>
                    <hr style="border:0; border-top:1px solid #e2e8f0; margin:5px 0;">
                    <span class="talle-item"><b>M:</b> 8 US</span>
                    <span class="talle-item">38 ARG</span>
                </div>
                <div class="talle-col">
                    <small>🧥 Buzos</small>
                    <span class="talle-item">L (US)</span>
                    <span class="talle-item">XL (ARG)</span>
                </div>
                <div class="talle-col">
                    <small>👕 Remeras</small>
                    <span class="talle-item">M (US)</span>
                    <span class="talle-item">L (ARG)</span>
                </div>
            </div>

            <div class="dato-clave">
                <small style="color: var(--accent); font-weight: 800; font-size: 0.6rem; text-transform: uppercase;">Dato Clave</small>
                <div style="font-weight: 700; font-size: 0.85rem; color: #1e293b; margin-top: 4px;">
                    Talles "S" en USA suelen ser "M" en Argentina.
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>Creado por Juan Cruz Bria <img src="https://flagcdn.com/w40/ar.png" class="flag-icon"></span>
        <div style="margin-top: 4px; opacity: 0.7;">© 2026 Todos los derechos reservados</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { 
            getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, doc, setDoc 
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let presupuestoBase = 0;

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.replace("login.html");
            else {
                currentUser = user;
                onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
                    presupuestoBase = docSnap.exists() ? (docSnap.data().fondo || 0) : 0;
                    listenGastos(user.uid);
                });
            }
        });

        function listenGastos(uid) {
            const q = query(collection(db, "compras"), where("userId", "==", uid), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('listaGastos');
                let totalGastado = 0;
                
                if (snapshot.empty) {
                    container.innerHTML = '<p style="text-align:center; color:#94a3b8; font-size:0.8rem;">No hay gastos registrados.</p>';
                    updateDisplay(0);
                    return;
                }

                container.innerHTML = snapshot.docs.map(docSnap => {
                    const d = docSnap.data();
                    const montoGasto = parseFloat(d.valor) || 0;
                    totalGastado += montoGasto;
                    const fecha = new Date(d.createdAt).toLocaleDateString('es-AR');
                    return `
                        <div class="history-item">
                            <div class="h-info"><b>${d.nombre || 'Sin nombre'}</b><span>${fecha}</span></div>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div class="h-amount">-$${montoGasto.toFixed(2)}</div>
                                <div style="color:#ef4444; font-weight:900; cursor:pointer; font-size:1.2rem;" onclick="deleteGasto('${docSnap.id}')">×</div>
                            </div>
                        </div>`;
                }).join('');
                updateDisplay(totalGastado);
            });
        }

        function updateDisplay(gastado) {
            const restante = presupuestoBase - gastado;
            const el = document.getElementById('disp-fondo');
            el.innerText = 'USD ' + restante.toLocaleString('en-US', {minimumFractionDigits: 2});
            el.style.color = restante < 0 ? '#fecaca' : 'white';
        }

        window.updateFondo = async () => {
            const val = document.getElementById('input-fondo').value;
            if(!val || !currentUser) return;
            await setDoc(doc(db, "usuarios", currentUser.uid), { fondo: parseFloat(val) }, { merge: true });
            document.getElementById('input-fondo').value = '';
        };

        window.addGasto = async () => {
            const nombre = document.getElementById('nombre').value.trim();
            const valor = document.getElementById('valor').value;
            if(!nombre || !valor) return;
            try {
                await addDoc(collection(db, "compras"), {
                    nombre: nombre,
                    valor: parseFloat(valor),
                    userId: currentUser.uid,
                    createdAt: Date.now()
                });
                document.getElementById('nombre').value = '';
                document.getElementById('valor').value = '';
            } catch (e) { alert("Error: " + e.message); }
        };

        window.deleteGasto = async (id) => {
            if(confirm("¿Eliminar este gasto?")) await deleteDoc(doc(db, "compras", id));
        };

        window.showSec = (s) => {
            document.getElementById('sec-gastos').style.display = s === 'gastos' ? 'block' : 'none';
            document.getElementById('sec-talles').style.display = s === 'talles' ? 'block' : 'none';
            document.getElementById('t-gastos').classList.toggle('active', s === 'gastos');
            document.getElementById('t-talles').classList.toggle('active', s === 'talles');
        };
    </script>
</body>
</html>
