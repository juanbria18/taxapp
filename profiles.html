<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfiles - TaxUSA</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --danger: #ef4444;
            --text-main: #f1f5f9;
            --text-sec: #94a3b8;
            --input-bg: #334155;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 40px; 
            font-weight: 500; 
            text-align: center; 
            letter-spacing: -0.5px;
            transition: var(--transition);
        }

        .profiles-container {
            display: flex; 
            gap: 25px; 
            flex-wrap: wrap;
            justify-content: center; 
            padding: 20px; 
            max-width: 900px;
            margin-bottom: 40px;
        }

        /* Contenedor Individual de Perfil */
        .profile { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 140px; 
            cursor: pointer;
            transition: var(--transition);
        }

        .avatar-wrapper { 
            position: relative; 
            width: 120px; 
            height: 120px; 
            margin-bottom: 12px; 
        }

        .avatar {
            width: 120px; 
            height: 120px; 
            border-radius: 4px;
            background: var(--card-bg) no-repeat center/cover;
            border: 3px solid transparent; 
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Efecto Hover fuera de edición */
        body:not(.editing-mode) .profile:hover .avatar { 
            transform: scale(1.08); 
            border-color: var(--text-main); 
        }

        /* Capa de Lápiz (Solo se activa en editing-mode) */
        .edit-overlay {
            position: absolute; 
            inset: 0;
            background: rgba(0,0,0,0.6); 
            border-radius: 4px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            opacity: 0; 
            pointer-events: none;
            transition: var(--transition);
            z-index: 5;
        }

        .editing-mode .edit-overlay { 
            opacity: 1; 
            pointer-events: auto; 
        }

        .edit-overlay svg { 
            width: 35px; 
            fill: white; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .name { 
            color: var(--text-sec); 
            font-size: 1.1rem; 
            font-weight: 500; 
            margin-top: 10px; 
            transition: var(--transition); 
        }
        
        body:not(.editing-mode) .profile:hover .name { color: var(--text-main); }

        /* Estilo Botón "Añadir" */
        .add-btn-inner {
            width: 100%;
            height: 100%;
            border: 2px dashed #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #475569;
            border-radius: 4px;
            transition: var(--transition);
        }
        .profile:hover .add-btn-inner { border-color: var(--text-sec); color: var(--text-sec); }

        /* Botón de Administración Inferior */
        .manage-btn {
            background: rgba(51, 65, 85, 0.4);
            color: var(--text-sec);
            border: 1px solid #475569;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: var(--transition);
        }
        .manage-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .editing-mode .manage-btn { background: white; color: black; border-color: white; }

        /* --- VENTANA MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; padding: 20px;
            backdrop-filter: blur(12px);
        }
        .modal.show { display: flex; animation: modalFade 0.3s ease; }

        .modal-content { width: 100%; max-width: 440px; text-align: center; }
        
        .preview-avatar {
            width: 130px; height: 130px; border-radius: 4px; margin: 0 auto 25px;
            border: 3px solid var(--primary); background-size: cover;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .edit-input {
            width: 100%; padding: 15px; background: var(--input-bg);
            border: 1px solid #475569; border-radius: 4px;
            color: white; font-size: 1.1rem; margin-bottom: 25px; outline: none;
        }

        .grid-fotos {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; margin-bottom: 25px; max-height: 200px; overflow-y: auto;
            padding: 10px;
        }
        .img-option { 
            width: 100%; aspect-ratio: 1; border-radius: 4px; 
            cursor: pointer; transition: 0.2s; border: 2px solid transparent; 
            object-fit: cover;
        }
        .img-option:hover { transform: scale(1.1); border-color: white; }

        .btn-group-modal { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn-m { 
            padding: 15px; border-radius: 4px; font-weight: 700; cursor: pointer; 
            border: none; text-transform: uppercase; font-size: 0.9rem;
        }
        .btn-m-save { background: white; color: black; }
        .btn-m-cancel { background: transparent; color: var(--text-sec); border: 1px solid var(--text-sec); }
        .btn-m-delete { color: var(--danger); background: transparent; margin-top: 15px; }

        @keyframes modalFade { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <h1 id="mainTitle"></h1>
    <div class="profiles-container" id="profilesContainer"></div>
    <button id="btnManage" class="manage-btn" onclick="toggleEditMode()"></button>

    <div id="modalEdit" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 25px;"></h2>
            <div id="editPreview" class="preview-avatar"></div>
            <input type="text" id="editNameInput" class="edit-input">
            <div class="grid-fotos" id="gridFotos"></div>
            <div class="btn-group-modal">
                <button class="btn-m btn-m-save" id="btnSave" onclick="guardarPerfil()"></button>
                <button class="btn-m btn-m-cancel" id="btnCancel" onclick="cerrarModal()"></button>
                <button id="btnEliminar" class="btn-m btn-m-delete" onclick="eliminarPerfil()"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const i18n = {
            es: { title: "¿Quién está planificando hoy?", editTitle: "Administrar Perfiles", manage: "Editar Perfiles", done: "Listo", save: "Guardar", cancel: "Cancelar", delete: "Eliminar Perfil", edit: "Editar Perfil", new: "Nuevo Perfil", guest: "Invitado", confirm: "¿Eliminar este perfil?" },
            en: { title: "Who's planning today?", editTitle: "Manage Profiles", manage: "Edit Profiles", done: "Done", save: "Save", cancel: "Cancel", delete: "Delete Profile", edit: "Edit Profile", new: "New Profile", guest: "Guest", confirm: "Delete this profile?" }
        };

        const lang = localStorage.getItem('appLang') || 'es';
        const t = i18n[lang];

        const personajes = [
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Mickey.webp",
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Buzz.png",
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Mike.png",
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Stitch.png",
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/WallE.png",
            "https://img.icons8.com/color/150/spiderman-new.png",
            "https://img.icons8.com/color/150/iron-man.png",
            "https://img.icons8.com/color/150/baby-yoda.png"
        ];

        let currentUID, perfilesLocal = [], editingId = null, selectedFoto = personajes[0], isEditingMode = false;

        // Inicializar textos
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('btnManage').innerText = t.manage;
        document.getElementById('btnSave').innerText = t.save;
        document.getElementById('btnCancel').innerText = t.cancel;
        document.getElementById('btnEliminar').innerText = t.delete;

        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.replace("login.html");
            currentUID = user.uid;
            const snap = await getDoc(doc(db, "usuarios", currentUID));
            perfilesLocal = snap.exists() ? (snap.data().perfiles || []) : [];
            if (perfilesLocal.length === 0) {
                perfilesLocal = [{ id: "p"+Date.now(), nombre: t.guest, foto: personajes[0] }];
                await setDoc(doc(db, "usuarios", currentUID), { perfiles: perfilesLocal });
            }
            render();
        });

        function render() {
            const container = document.getElementById('profilesContainer');
            container.innerHTML = perfilesLocal.map(p => `
                <div class="profile" onclick="handleAction('${p.id}', '${p.nombre}', '${p.foto}')">
                    <div class="avatar-wrapper">
                        <div class="avatar" style="background-image: url('${p.foto}')"></div>
                        <div class="edit-overlay">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </div>
                    </div>
                    <div class="name">${p.nombre}</div>
                </div>
            `).join('');

            if (perfilesLocal.length < 5) {
                container.innerHTML += `
                    <div class="profile" onclick="abrirEditor(null)">
                        <div class="avatar-wrapper"><div class="add-btn-inner">+</div></div>
                        <div class="name">${t.new}</div>
                    </div>`;
            }
        }

        window.toggleEditMode = () => {
            isEditingMode = !isEditingMode;
            document.body.classList.toggle('editing-mode', isEditingMode);
            document.getElementById('mainTitle').innerText = isEditingMode ? t.editTitle : t.title;
            document.getElementById('btnManage').innerText = isEditingMode ? t.done : t.manage;
        };

        window.handleAction = (id, nombre, foto) => {
            if (isEditingMode) abrirEditor(id);
            else {
                localStorage.setItem('perfilActivoId', id);
                localStorage.setItem('perfilActivoNombre', nombre);
                localStorage.setItem('perfilActivoFoto', foto);
                window.location.replace("index.html");
            }
        };

        window.abrirEditor = (id) => {
            editingId = id;
            const p = perfilesLocal.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = id ? t.edit : t.new;
            document.getElementById('editNameInput').value = p ? p.nombre : "";
            selectedFoto = p ? p.foto : personajes[0];
            document.getElementById('btnEliminar').style.display = id ? "block" : "none";
            actualizarPreview();
            
            const grid = document.getElementById('gridFotos');
            grid.innerHTML = personajes.map(url => `
                <img src="${url}" class="img-option" onclick="cambiarFoto('${url}')">
            `).join('');
            
            document.getElementById('modalEdit').classList.add('show');
        };

        window.cambiarFoto = (url) => { selectedFoto = url; actualizarPreview(); };
        window.actualizarPreview = () => document.getElementById('editPreview').style.backgroundImage = `url('${selectedFoto}')`;
        window.cerrarModal = () => document.getElementById('modalEdit').classList.remove('show');

        window.guardarPerfil = async () => {
            const nom = document.getElementById('editNameInput').value.trim();
            if (!nom) return;
            if (editingId) perfilesLocal = perfilesLocal.map(p => p.id === editingId ? {...p, nombre: nom, foto: selectedFoto} : p);
            else perfilesLocal.push({ id: "p"+Date.now(), nombre: nom, foto: selectedFoto });
            
            await updateDoc(doc(db, "usuarios", currentUID), { perfiles: perfilesLocal });
            cerrarModal(); 
            if(isEditingMode) toggleEditMode();
            render();
        };

        window.eliminarPerfil = async () => {
            if (perfilesLocal.length <= 1) return;
            if (!confirm(t.confirm)) return;
            perfilesLocal = perfilesLocal.filter(p => p.id !== editingId);
            await updateDoc(doc(db, "usuarios", currentUID), { perfiles: perfilesLocal });
            cerrarModal();
            if(isEditingMode) toggleEditMode();
            render();
        };
    </script>
</body>
</html>
