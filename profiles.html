<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selecciona perfil - TaxUSA</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --danger: #ef4444;
            --text-main: #f1f5f9;
            --text-sec: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { font-size: 2.2rem; margin-bottom: 40px; font-weight: 300; text-align: center; }

        .profiles-container {
            display: flex; gap: 30px; flex-wrap: wrap;
            justify-content: center; padding: 20px; max-width: 800px;
        }

        .profile { display: flex; flex-direction: column; align-items: center; width: 130px; }

        .avatar-wrapper { position: relative; width: 110px; height: 110px; margin-bottom: 15px; }

        .avatar {
            width: 110px; height: 110px; border-radius: 50%;
            background: var(--card-bg); background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 4px solid transparent; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .avatar:hover { transform: scale(1.05); border-color: var(--primary); }

        .edit-badge {
            position: absolute; bottom: 5px; right: 5px;
            background: #000; border: 2px solid #fff;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; transition: 0.2s;
        }

        .edit-badge:hover { transform: scale(1.2); background: var(--primary); }

        .name { color: var(--text-sec); font-size: 1.1rem; text-align: center; margin-top: 5px; }

        .add-profile { border: 2px dashed #475569; background: none; color: #475569; font-size: 2.5rem; }

        .modal-galeria {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: none; flex-direction: column; align-items: center;
            padding: 40px 20px; z-index: 100; overflow-y: auto;
        }

        .grid-fotos {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px; max-width: 600px; width: 100%; margin-top: 30px;
        }

        .img-option {
            width: 100px; height: 100px; border-radius: 50%; cursor: pointer;
            transition: 0.3s; object-fit: cover; border: 3px solid transparent;
        }

        .img-option:hover { transform: scale(1.1); border-color: var(--primary); }

        .btn-group { display: flex; gap: 15px; margin-top: 30px; }

        .btn {
            padding: 12px 25px; border: none; border-radius: 25px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }

        .btn-cancelar { background: #334155; color: white; }
        .btn-eliminar { background: var(--danger); color: white; }

        .show { display: flex !important; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1 id="mainTitle" data-key="title">¿Quién está planificando hoy?</h1>
    <div class="profiles-container" id="profilesContainer"></div>

    <div id="galeria" class="modal-galeria">
        <h2 id="tituloGaleria" style="font-weight: 300;" data-key="chooseChar">Elige tu Personaje</h2>
        <div class="grid-fotos" id="gridFotos"></div>
        <div class="btn-group">
            <button id="btnEliminarPerfil" class="btn btn-eliminar" style="display: none;" data-key="deleteProfile">Eliminar Perfil</button>
            <button class="btn btn-cancelar" onclick="cerrarGaleria()" data-key="cancel">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- MOTOR DE IDIOMAS ---
        const i18n = {
            es: {
                title: "¿Quién está planificando hoy?",
                chooseChar: "Elige tu Personaje",
                deleteProfile: "Eliminar Perfil",
                cancel: "Cancelar",
                new: "Nuevo",
                guest: "Invitado",
                promptName: "Nombre del perfil:",
                promptNewName: "¿Cómo se llamará el nuevo perfil?",
                confirmDelete: "¿Eliminar este perfil?",
                lastProfileAlert: "No puedes eliminar el último perfil.",
                newProfileTitle: "Elige personaje para tu nuevo perfil",
                updatePhotoTitle: "Actualizar foto de "
            },
            en: {
                title: "Who's planning today?",
                chooseChar: "Choose your Character",
                deleteProfile: "Delete Profile",
                cancel: "Cancel",
                new: "New",
                guest: "Guest",
                promptName: "Profile name:",
                promptNewName: "What's the name for the new profile?",
                confirmDelete: "Delete this profile?",
                lastProfileAlert: "You cannot delete the last profile.",
                newProfileTitle: "Choose a character for your new profile",
                updatePhotoTitle: "Update photo for "
            }
        };

        const currentLang = localStorage.getItem('appLang') || 'es';

        function applyLanguage() {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (i18n[currentLang][key]) el.innerText = i18n[currentLang][key];
            });
        }

        let currentUID = null;
        let modoEdicion = false;
        let perfilIdAEditar = null;
        let nombreTemporal = "";

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.replace("login.html"); return; }
            currentUID = user.uid;
            applyLanguage(); // Aplicar idioma al cargar los datos del usuario

            const userRef = doc(db, "usuarios", currentUID);
            const userSnap = await getDoc(userRef);
            
            let perfiles = userSnap.exists() ? (userSnap.data().perfiles || []) : [];
            if (!userSnap.exists() || perfiles.length === 0) {
                perfiles = [{ id: "p" + Date.now(), nombre: i18n[currentLang].guest, foto: "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Mickey.webp" }];
                await setDoc(userRef, { perfiles });
            }
            renderPerfiles(perfiles);
        });

        function renderPerfiles(perfiles) {
            const container = document.getElementById('profilesContainer');
            container.innerHTML = perfiles.map(p => `
                <div class="profile">
                    <div class="avatar-wrapper">
                        <div class="avatar" style="background-image: url('${p.foto}')" onclick="selectProfile('${p.id}', '${p.nombre}', '${p.foto}')"></div>
                        <div class="edit-badge" onclick="prepararEdicion('${p.id}', '${p.nombre}')">✏️</div>
                    </div>
                    <div class="name">${p.nombre}</div>
                </div>
            `).join('');

            if (perfiles.length < 5) {
                const addBtn = document.createElement('div');
                addBtn.className = 'profile';
                addBtn.innerHTML = `<div class="avatar add-profile" onclick="abrirModoCrear()">+</div><div class="name">${i18n[currentLang].new}</div>`;
                container.appendChild(addBtn);
            }
        }

        window.abrirModoCrear = () => {
            modoEdicion = false;
            document.getElementById('btnEliminarPerfil').style.display = 'none';
            document.getElementById('tituloGaleria').innerText = i18n[currentLang].newProfileTitle;
            abrirGaleria();
        };

        window.prepararEdicion = (id, nombreActual) => {
            modoEdicion = true;
            perfilIdAEditar = id;
            const nuevoNombre = prompt(i18n[currentLang].promptName, nombreActual);
            if (nuevoNombre) {
                nombreTemporal = nuevoNombre;
                document.getElementById('btnEliminarPerfil').style.display = 'block';
                document.getElementById('tituloGaleria').innerText = i18n[currentLang].updatePhotoTitle + nuevoNombre;
                abrirGaleria();
            }
        };

        window.abrirGaleria = () => {
            const grid = document.getElementById('gridFotos');
            grid.innerHTML = "";
            const personajes = [
                { name: "Buzz", url: "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Buzz.png" },
                { name: "Mike", url: "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Mike.png" },
                { name: "Stitch", url: "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Stitch.png" },
                { name: "Wall-E", url: "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/WallE.png" },
                { name: "Mickey", url: "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Mickey.webp" },
                { name: "Spider-Man", url: "https://img.icons8.com/color/150/spiderman-new.png" },
                { name: "Iron Man", url: "https://img.icons8.com/color/150/iron-man.png" },
                { name: "Baby Yoda", url: "https://img.icons8.com/color/150/baby-yoda.png" },
                { name: "Mario", url: "https://img.icons8.com/color/150/super-mario.png" },
                { name: "Sonic", url: "https://img.icons8.com/color/150/sonic-the-hedgehog-1.png" },
                { name: "Homer", url: "https://img.icons8.com/color/150/homer-simpson.png" },
                { name: "Harry Potter", url: "https://img.icons8.com/color/150/harry-potter.png" }
            ];

            personajes.forEach(p => {
                const img = document.createElement('img');
                img.src = p.url;
                img.className = 'img-option';
                img.onclick = () => ejecutarAccionPerfil(p.url);
                grid.appendChild(img);
            });
            document.getElementById('galeria').classList.add('show');
        };

        window.cerrarGaleria = () => document.getElementById('galeria').classList.remove('show');

        async function ejecutarAccionPerfil(fotoUrl) {
            const userRef = doc(db, "usuarios", currentUID);
            const userSnap = await getDoc(userRef);
            let perfiles = userSnap.data().perfiles || [];

            if (modoEdicion) {
                perfiles = perfiles.map(p => 
                    p.id === perfilIdAEditar ? { ...p, nombre: nombreTemporal, foto: fotoUrl } : p
                );
            } else {
                const nombre = prompt(i18n[currentLang].promptNewName);
                if (!nombre) return;
                perfiles.push({ id: "p" + Date.now(), nombre, foto: fotoUrl });
            }

            await updateDoc(userRef, { perfiles });
            location.reload();
        }

        document.getElementById('btnEliminarPerfil').onclick = async () => {
            if (confirm(i18n[currentLang].confirmDelete)) {
                const userRef = doc(db, "usuarios", currentUID);
                const userSnap = await getDoc(userRef);
                const perfiles = (userSnap.data().perfiles || []).filter(p => p.id !== perfilIdAEditar);
                
                if (perfiles.length === 0) {
                    alert(i18n[currentLang].lastProfileAlert);
                    return;
                }

                await updateDoc(userRef, { perfiles });
                location.reload();
            }
        };

        window.selectProfile = (id, nombre, foto) => {
            localStorage.setItem('perfilActivoId', id);
            localStorage.setItem('perfilActivoNombre', nombre);
            localStorage.setItem('perfilActivoFoto', foto);
            window.location.replace("index.html");
        };
    </script>
</body>
</html>
