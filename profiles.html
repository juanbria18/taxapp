<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfiles - TaxUSA</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --danger: #ef4444;
            --text-main: #f1f5f9;
            --text-sec: #94a3b8;
            --input-bg: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 40px; 
            font-weight: 500; 
            text-align: center; 
            letter-spacing: -0.5px;
            animation: fadeInDown 0.6s ease;
        }

        .profiles-container {
            display: flex; gap: 25px; flex-wrap: wrap;
            justify-content: center; padding: 20px; max-width: 900px;
        }

        /* Estilo perfiles tipo Streaming */
        .profile { 
            display: flex; flex-direction: column; align-items: center; width: 130px; 
            cursor: pointer;
        }

        .avatar-wrapper { position: relative; width: 110px; height: 110px; margin-bottom: 12px; }

        .avatar {
            width: 110px; height: 110px; border-radius: 4px;
            background: var(--card-bg) no-repeat center/cover;
            border: 3px solid transparent; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile:hover .avatar { transform: scale(1.05); border-color: var(--text-main); }

        .edit-badge {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s;
        }
        .profile:hover .edit-badge { opacity: 1; }
        .edit-badge svg { width: 28px; fill: white; }

        .name { color: var(--text-sec); font-size: 1rem; font-weight: 500; margin-top: 10px; transition: 0.3s; }
        .profile:hover .name { color: var(--text-main); }

        .add-profile-btn { 
            border: 2px dashed #475569; background: transparent; 
            color: #475569; font-size: 2.5rem; display: flex; 
            align-items: center; justify-content: center;
        }

        /* Modal de Edición */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; padding: 20px;
            backdrop-filter: blur(8px);
        }
        .modal.show { display: flex; animation: fadeIn 0.3s ease; }

        .modal-content { width: 100%; max-width: 420px; text-align: center; }
        
        .edit-avatar-preview {
            width: 120px; height: 120px; border-radius: 4px; margin: 0 auto 25px;
            border: 3px solid var(--primary); background-size: cover;
        }

        input.edit-name-input {
            width: 100%; padding: 14px; background: var(--input-bg);
            border: 1px solid #475569; border-radius: 4px;
            color: white; font-size: 1.1rem; margin-bottom: 25px; outline: none;
        }

        .grid-fotos {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin-bottom: 25px; max-height: 180px; overflow-y: auto;
            padding: 5px;
        }
        .img-option { 
            width: 100%; aspect-ratio: 1; border-radius: 4px; 
            cursor: pointer; transition: 0.2s; border: 2px solid transparent; 
            object-fit: cover;
        }
        .img-option:hover { transform: scale(1.1); border-color: white; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .btn { 
            padding: 14px; border-radius: 4px; font-weight: 700; cursor: pointer; 
            border: none; text-transform: uppercase; font-size: 0.9rem;
        }
        .btn-save { background: white; color: black; }
        .btn-cancel { background: transparent; color: var(--text-sec); border: 1px solid var(--text-sec); }
        .btn-delete { color: var(--danger); background: transparent; font-size: 0.8rem; margin-top: 15px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1 id="mainTitle"></h1>
    <div class="profiles-container" id="profilesContainer"></div>

    <div id="modalEdit" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 20px;"></h2>
            <div id="editPreview" class="edit-avatar-preview"></div>
            <input type="text" id="editNameInput" class="edit-name-input">
            <div class="grid-fotos" id="gridFotos"></div>
            <div class="btn-group">
                <button class="btn btn-save" id="btnSave" onclick="guardarPerfil()"></button>
                <button class="btn btn-cancel" id="btnCancel" onclick="cerrarModal()"></button>
                <button id="btnEliminar" class="btn btn-delete" onclick="eliminarPerfil()"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- LÓGICA DE IDIOMAS AUTOMÁTICA ---
        const i18n = {
            es: { 
                title: "¿Quién está planificando hoy?", 
                save: "Guardar", 
                cancel: "Ahora no", 
                delete: "Eliminar Perfil", 
                edit: "Editar Perfil", 
                new: "Añadir Perfil", 
                guest: "Invitado",
                confirmDelete: "¿Seguro quieres eliminar este perfil?",
                lastProfile: "No puedes eliminar el último perfil."
            },
            en: { 
                title: "Who's planning today?", 
                save: "Save", 
                cancel: "Not now", 
                delete: "Delete Profile", 
                edit: "Edit Profile", 
                new: "Add Profile", 
                guest: "Guest",
                confirmDelete: "Are you sure you want to delete this profile?",
                lastProfile: "You cannot delete the last profile."
            }
        };

        // Detecta el idioma guardado en Login
        const currentLang = localStorage.getItem('appLang') || 'es';
        const t = i18n[currentLang];

        const personajes = [
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Mickey.webp",
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Buzz.png",
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Mike.png",
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/Stitch.png",
            "https://raw.githubusercontent.com/TaxappUSA/TaxappUSA/main/WallE.png",
            "https://img.icons8.com/color/150/spiderman-new.png",
            "https://img.icons8.com/color/150/iron-man.png",
            "https://img.icons8.com/color/150/baby-yoda.png"
        ];

        let currentUID = null;
        let perfilesLocal = [];
        let editingId = null;
        let selectedFoto = personajes[0];

        // Traducir textos iniciales
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('btnSave').innerText = t.save;
        document.getElementById('btnCancel').innerText = t.cancel;
        document.getElementById('btnEliminar').innerText = t.delete;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.replace("login.html"); return; }
            currentUID = user.uid;
            cargarPerfiles();
        });

        async function cargarPerfiles() {
            const userRef = doc(db, "usuarios", currentUID);
            const userSnap = await getDoc(userRef);
            perfilesLocal = userSnap.exists() ? (userSnap.data().perfiles || []) : [];
            
            if (perfilesLocal.length === 0) {
                perfilesLocal = [{ id: "p" + Date.now(), nombre: t.guest, foto: personajes[0] }];
                await setDoc(userRef, { perfiles: perfilesLocal });
            }
            render();
        }

        function render() {
            const container = document.getElementById('profilesContainer');
            container.innerHTML = perfilesLocal.map(p => `
                <div class="profile">
                    <div class="avatar-wrapper">
                        <div class="avatar" style="background-image: url('${p.foto}')" onclick="selectProfile('${p.id}', '${p.nombre}', '${p.foto}')"></div>
                        <div class="edit-badge" onclick="abrirEditor('${p.id}')">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </div>
                    </div>
                    <div class="name">${p.nombre}</div>
                </div>
            `).join('');

            if (perfilesLocal.length < 5) {
                container.innerHTML += `
                    <div class="profile" onclick="abrirEditor(null)">
                        <div class="avatar add-profile-btn">+</div>
                        <div class="name">${t.new}</div>
                    </div>`;
            }
        }

        window.abrirEditor = (id) => {
            editingId = id;
            const p = perfilesLocal.find(x => x.id === id);
            
            document.getElementById('modalTitle').innerText = id ? t.edit : t.new;
            document.getElementById('editNameInput').value = p ? p.nombre : "";
            document.getElementById('editNameInput').placeholder = t.guest;
            selectedFoto = p ? p.foto : personajes[0];
            document.getElementById('btnEliminar').style.display = id ? "block" : "none";
            
            actualizarPreview();
            cargarGaleria();
            document.getElementById('modalEdit').classList.add('show');
        };

        function cargarGaleria() {
            const grid = document.getElementById('gridFotos');
            grid.innerHTML = personajes.map(url => `
                <img src="${url}" class="img-option" onclick="cambiarFoto('${url}')">
            `).join('');
        }

        window.cambiarFoto = (url) => {
            selectedFoto = url;
            actualizarPreview();
        };

        function actualizarPreview() {
            document.getElementById('editPreview').style.backgroundImage = `url('${selectedFoto}')`;
        }

        window.cerrarModal = () => document.getElementById('modalEdit').classList.remove('show');

        window.guardarPerfil = async () => {
            const nuevoNombre = document.getElementById('editNameInput').value.trim();
            if (!nuevoNombre) return;

            if (editingId) {
                perfilesLocal = perfilesLocal.map(p => p.id === editingId ? { ...p, nombre: nuevoNombre, foto: selectedFoto } : p);
            } else {
                perfilesLocal.push({ id: "p" + Date.now(), nombre: nuevoNombre, foto: selectedFoto });
            }

            await updateDoc(doc(db, "usuarios", currentUID), { perfiles: perfilesLocal });
            cerrarModal();
            render();
        };

        window.eliminarPerfil = async () => {
            if (perfilesLocal.length <= 1) return alert(t.lastProfile);
            if (!confirm(t.confirmDelete)) return;

            perfilesLocal = perfilesLocal.filter(p => p.id !== editingId);
            await updateDoc(doc(db, "usuarios", currentUID), { perfiles: perfilesLocal });
            cerrarModal();
            render();
        };

        window.selectProfile = (id, nombre, foto) => {
            localStorage.setItem('perfilActivoId', id);
            localStorage.setItem('perfilActivoNombre', nombre);
            localStorage.setItem('perfilActivoFoto', foto);
            window.location.replace("index.html");
        };
    </script>
</body>
</html>
