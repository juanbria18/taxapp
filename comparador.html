<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comparador de Precios - Shopping USA</title>
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --light: #f8fafc;
            --white: #ffffff;
            --accent: #10b981;
            --border: #e2e8f0;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .nav-back {
            display: inline-block;
            text-decoration: none;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        h2 { margin: 0 0 20px 0; font-size: 1.5rem; font-weight: 900; color: var(--primary); }

        /* CONFIGURACIÓN API KEY */
        .key-box {
            background: #eff6ff;
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 25px;
            border: 2px dashed var(--primary);
        }

        .key-box label {
            display: block;
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .key-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--white);
            border-radius: 12px;
            font-size: 0.85rem;
            outline: none;
            box-sizing: border-box;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        /* BUSCADOR Y CÁMARA */
        .search-section input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-search { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-lens { background: #0ea5e9; color: white; }
        .btn:active { transform: scale(0.98); }

        /* VISTA DE CÁMARA */
        #video-container {
            display: none;
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 15px;
            background: black;
            position: relative;
        }

        video { width: 100%; display: block; }
        
        .capture-overlay {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 5px solid white;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
        }

        /* RESULTADOS */
        #resultsArea { margin-top: 25px; }
        .result-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; background: #f1f5f9; }
        .result-info { flex: 1; }
        .result-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .result-price { color: var(--accent); font-weight: 900; font-size: 1rem; }
        .result-source { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; }

        .loading-spinner {
            text-align: center;
            padding: 20px;
            font-weight: 800;
            color: var(--primary);
            display: none;
        }

        img.emoji { height: 1em; width: 1em; margin: 0 .05em 0 .1em; vertical-align: -0.1em; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="nav-back">← VOLVER A GASTOS</a>
        <h2>🛍️ Comparador Pro</h2>

        <div class="key-box">
            <label>Mi SerpApi Key (Privada)</label>
            <input type="password" id="serpKey" placeholder="Pega tu API Key aquí..." onchange="saveKey()">
            <div class="status-bar">
                <span id="apiStatus" style="color: #64748b;">● DESCONECTADO</span>
                <span id="creditsLabel">CRÉDITOS: --</span>
            </div>
            <a href="https://serpapi.com/users/sign_up" target="_blank" style="font-size: 0.6rem; color: var(--primary); text-decoration: none; margin-top: 10px; display: block; font-weight: 700;">¿No tienes una Key? Obtenla gratis aquí ↗</a>
        </div>

        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="capture-overlay" onclick="takePhoto()"></div>
            <p style="position:absolute; top:10px; width:100%; text-align:center; color:white; font-size:0.7rem; font-weight:bold; text-shadow:1px 1px 2px black;">TOCA EL CÍRCULO PARA BUSCAR</p>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Ej: Nike Dunk Low Retro">
            <button class="btn btn-search" onclick="searchProduct()">
                <span>🔍</span> BUSCAR POR TEXTO
            </button>
            <button class="btn btn-lens" id="btnStartCamera" onclick="startCamera()">
                <span>📸</span> BUSCAR POR FOTO
            </button>
        </div>

        <div id="loading" class="loading-spinner">Procesando búsqueda... 🛒</div>
        <div id="resultsArea"></div>
    </div>

    <canvas id="photoCanvas" style="display:none;"></canvas>

    <script>
        let stream = null;
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('photoCanvas');

        window.onload = () => {
            const savedKey = localStorage.getItem('serp_key_viaje');
            if (savedKey) {
                document.getElementById('serpKey').value = savedKey;
                document.getElementById('apiStatus').innerText = "● KEY GUARDADA";
                document.getElementById('apiStatus').style.color = "#10b981";
            }
            twemoji.parse(document.body);
        };

        function saveKey() {
            const key = document.getElementById('serpKey').value;
            localStorage.setItem('serp_key_viaje', key);
            document.getElementById('apiStatus').innerText = "● KEY ACTUALIZADA";
            document.getElementById('apiStatus').style.color = "#10b981";
        }

        async function startCamera() {
            const key = document.getElementById('serpKey').value;
            if (!key) return alert("Ingresa tu API Key primero");
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                document.getElementById('video-container').style.display = 'block';
                document.getElementById('btnStartCamera').style.display = 'none';
                window.scrollTo(0, 0);
            } catch (err) {
                alert("No se pudo acceder a la cámara. Verifica los permisos.");
            }
        }

        async function takePhoto() {
            const key = document.getElementById('serpKey').value;
            const loader = document.getElementById('loading');
            const resultsArea = document.getElementById('resultsArea');
            
            // Capturar frame del video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Detener cámara
            stream.getTracks().forEach(track => track.stop());
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('btnStartCamera').style.display = 'flex';

            loader.style.display = "block";
            loader.innerText = "Analizando con Google Lens... 🧐";
            resultsArea.innerHTML = "";

            // Convertir a Blob y enviar vía POST (Directo a la API, no se guarda)
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("engine", "google_lens");
                formData.append("api_key", key);
                formData.append("file", blob);

                try {
                    const response = await fetch("https://serpapi.com/search.json", {
                        method: "POST",
                        body: formData
                    });
                    const data = await response.json();
                    renderResults(data, "visual_matches");
                } catch (error) {
                    loader.style.display = "none";
                    alert("Error en la búsqueda visual. Verifica tu Key.");
                }
            }, 'image/jpeg', 0.8);
        }

        async function searchProduct() {
            const query = document.getElementById('searchInput').value;
            const key = document.getElementById('serpKey').value;
            if (!key) return alert("Ingresa tu API Key primero");
            if (!query) return alert("Escribe un producto para buscar");

            const loader = document.getElementById('loading');
            const resultsArea = document.getElementById('resultsArea');
            
            resultsArea.innerHTML = "";
            loader.style.display = "block";
            loader.innerText = "Buscando mejores ofertas... 🔍";

            const url = `https://serpapi.com/search.json?engine=google_shopping&q=${encodeURIComponent(query)}&google_domain=google.com&hl=en&gl=us&api_key=${key}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                renderResults(data, "shopping_results");
            } catch (error) {
                loader.style.display = "none";
                alert("Error en la búsqueda por texto.");
            }
        }

        function renderResults(data, keyType) {
            const resultsArea = document.getElementById('resultsArea');
            const loader = document.getElementById('loading');
            loader.style.display = "none";

            // Actualizar contador de créditos del usuario
            if (data.search_metadata && data.search_metadata.serpapi_credits !== undefined) {
                const credits = data.search_metadata.serpapi_credits;
                const label = document.getElementById('creditsLabel');
                label.innerText = `CRÉDITOS: ${credits}`;
                label.style.color = credits < 10 ? "#ef4444" : "#10b981";
            }

            const results = data[keyType];
            if (results && results.length > 0) {
                results.slice(0, 8).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <img src="${item.thumbnail}" class="result-img">
                        <div class="result-info">
                            <div class="result-source">${item.source || 'Tienda USA'}</div>
                            <div class="result-title">${item.title}</div>
                            <div class="result-price">${item.price || 'Ver precio'}</div>
                        </div>
                        <a href="${item.link}" target="_blank" style="text-decoration:none; font-size:1.2rem;">🚀</a>
                    `;
                    resultsArea.appendChild(card);
                });
            } else {
                resultsArea.innerHTML = "<p style='text-align:center; font-weight:700;'>No se encontraron coincidencias.</p>";
            }
            twemoji.parse(resultsArea);
        }
    </script>
</body>
</html>
