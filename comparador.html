<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comparador de Precios - Shopping USA</title>
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent: #10b981;
        }

        body.dark-mode {
            --bg: #0f172a;
            --white: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        /* NAVEGACIÓN SUPERIOR */
        .nav-bar {
            width: 100%;
            max-width: 450px;
            margin-bottom: 15px;
            display: flex;
            gap: 5px;
            justify-content: space-between;
        }

        .btn-nav {
            flex: 1;
            padding: 10px 2px;
            background: var(--white);
            border-radius: 12px;
            font-weight: 800;
            text-align: center;
            text-decoration: none;
            font-size: 0.65rem;
            border: 2px solid var(--primary);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-nav.active {
            background: var(--primary);
            color: white;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            position: relative;
        }

        /* RUEDA DE AJUSTES */
        .settings-trigger {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
        }

        h2 { margin: 0 0 20px 0; font-size: 1.5rem; font-weight: 900; color: var(--primary); }

        /* MENU LATERAL */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
        }

        .settings-drawer {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: var(--white);
            z-index: 1001;
            transition: 0.3s;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }

        .settings-drawer.open { right: 0; }

        .drawer-btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--white);
            color: var(--text-main);
            font-weight: 700;
            cursor: pointer;
            text-align: left;
        }

        /* BUSCADOR Y CÁMARA */
        .key-box {
            background: var(--bg);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 25px;
            border: 2px dashed var(--primary);
        }

        .key-box label {
            display: block;
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .key-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--white);
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
        }

        .search-section input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            background: var(--white);
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-search { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-lens { background: #0ea5e9; color: white; }

        #video-container {
            display: none;
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 15px;
            background: black;
            position: relative;
        }

        video { width: 100%; display: block; }
        
        .capture-overlay {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 5px solid white;
            background: rgba(255,255,255,0.2);
        }

        .result-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .result-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        .result-info { flex: 1; }
        .result-price { color: var(--accent); font-weight: 900; }
        .result-source { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; }

        .loading-spinner { text-align: center; padding: 20px; font-weight: 800; color: var(--primary); display: none; }
        img.emoji { height: 1em; width: 1em; vertical-align: -0.1em; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html" class="btn-nav">INICIO</a>
        <a href="gastos.html" class="btn-nav">GASTOS</a>
        <a href="itinerario.html" class="btn-nav">ITINERARIO</a>
        <a href="unidades.html" class="btn-nav">UNIDADES</a>
        <a href="comparador.html" class="btn-nav active">COMPRAS</a>
    </nav>

    <div class="container">
        <button class="settings-trigger" onclick="toggleMenu()">⚙️</button>
        <h2>🛍️ Comparador Pro</h2>

        <div class="key-box">
            <label>SerpApi Key (Configuración)</label>
            <input type="password" id="serpKey" placeholder="Pega tu API Key aquí..." onchange="saveKey()">
            <div class="status-bar" style="display:flex; justify-content: space-between; font-size: 0.7rem; margin-top: 8px; font-weight: bold;">
                <span id="apiStatus" style="color: #64748b;">● DESCONECTADO</span>
                <span id="creditsLabel">CRÉDITOS: --</span>
            </div>
        </div>

        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="capture-overlay" onclick="takePhoto()"></div>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Ej: Nike Dunk Low">
            <button class="btn btn-search" onclick="searchProduct()">
                <span>🔍</span> BUSCAR POR TEXTO
            </button>
            <button class="btn btn-lens" id="btnStartCamera" onclick="startCamera()">
                <span>📸</span> BUSCAR POR FOTO
            </button>
        </div>

        <div id="loading" class="loading-spinner">Procesando... 🛒</div>
        <div id="resultsArea"></div>
    </div>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="settings-drawer" id="settingsDrawer">
        <h3 style="margin-top:0">Ajustes</h3>
        <button class="drawer-btn" onclick="toggleDarkMode()">🌓 Modo Oscuro/Claro</button>
        <button class="drawer-btn" onclick="location.reload()">🔄 Forzar Actualización</button>
        <div style="margin-top:auto; font-size:0.7rem; color:var(--text-muted); text-align:center;">
            Desarrollado para Shopping USA
        </div>
    </div>

    <canvas id="photoCanvas" style="display:none;"></canvas>

    <script>
        let stream = null;
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('photoCanvas');

        window.onload = () => {
            // Cargar Dark Mode
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-mode');
            }
            
            // Cargar API Key
            const savedKey = localStorage.getItem('serp_key_viaje');
            if (savedKey) {
                document.getElementById('serpKey').value = savedKey;
                document.getElementById('apiStatus').innerText = "● KEY LISTA";
                document.getElementById('apiStatus').style.color = "#10b981";
            }
            twemoji.parse(document.body);
        };

        function toggleMenu() {
            const drawer = document.getElementById('settingsDrawer');
            const overlay = document.getElementById('menuOverlay');
            drawer.classList.toggle('open');
            overlay.style.display = drawer.classList.contains('open') ? 'block' : 'none';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        }

        function saveKey() {
            const key = document.getElementById('serpKey').value;
            localStorage.setItem('serp_key_viaje', key);
            document.getElementById('apiStatus').innerText = "● KEY ACTUALIZADA";
            document.getElementById('apiStatus').style.color = "#10b981";
        }

        async function startCamera() {
            const key = document.getElementById('serpKey').value;
            if (!key) return alert("Configura tu API Key en ajustes");
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                document.getElementById('video-container').style.display = 'block';
                document.getElementById('btnStartCamera').style.display = 'none';
            } catch (err) {
                alert("Error al acceder a la cámara.");
            }
        }

        async function takePhoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            stream.getTracks().forEach(track => track.stop());
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('btnStartCamera').style.display = 'flex';

            document.getElementById('loading').style.display = "block";
            document.getElementById('resultsArea').innerHTML = "";

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("engine", "google_lens");
                formData.append("api_key", document.getElementById('serpKey').value);
                formData.append("file", blob);

                try {
                    const response = await fetch("https://serpapi.com/search.json", { method: "POST", body: formData });
                    const data = await response.json();
                    renderResults(data, "visual_matches");
                } catch (e) { alert("Error en búsqueda visual"); }
            }, 'image/jpeg', 0.8);
        }

        async function searchProduct() {
            const query = document.getElementById('searchInput').value;
            const key = document.getElementById('serpKey').value;
            if (!key || !query) return alert("Completa la búsqueda y la Key");

            document.getElementById('loading').style.display = "block";
            document.getElementById('resultsArea').innerHTML = "";

            const url = `https://serpapi.com/search.json?engine=google_shopping&q=${encodeURIComponent(query)}&google_domain=google.com&hl=en&gl=us&api_key=${key}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                renderResults(data, "shopping_results");
            } catch (e) { alert("Error en búsqueda"); }
        }

        function renderResults(data, keyType) {
            const resultsArea = document.getElementById('resultsArea');
            document.getElementById('loading').style.display = "none";

            if (data.search_metadata && data.search_metadata.serpapi_credits) {
                document.getElementById('creditsLabel').innerText = `CRÉDITOS: ${data.search_metadata.serpapi_credits}`;
            }

            const results = data[keyType];
            if (results && results.length > 0) {
                results.slice(0, 8).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <img src="${item.thumbnail}" class="result-img">
                        <div class="result-info">
                            <div class="result-source">${item.source || 'Tienda USA'}</div>
                            <div class="result-title" style="font-size:0.8rem; font-weight:bold;">${item.title}</div>
                            <div class="result-price">${item.price || 'Ver'}</div>
                        </div>
                        <a href="${item.link}" target="_blank" style="text-decoration:none;">🚀</a>
                    `;
                    resultsArea.appendChild(card);
                });
            } else {
                resultsArea.innerHTML = "<p style='text-align:center;'>No hay resultados.</p>";
            }
            twemoji.parse(resultsArea);
        }
    </script>
</body>
</html>
