<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - TaxUSA</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#2563eb">

    <script src="https://www.google.com/recaptcha/api.js?render=6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw"></script>

    <style>
        /* Colores fijados en Modo Oscuro Obligatorio */
        :root { 
            --primary: #3b82f6; 
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f1f5f9; 
            --text-sec: #94a3b8;
            --input-bg: #334155;
            --input-border: #475569;
            --accent: #1e3a8a; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
            color: var(--text-main);
        }

        /* Selector de Idioma Aesthetic */
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .lang-btn {
            background: var(--card-bg);
            border: 1px solid var(--input-border);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
        }
        .lang-btn.active { border-color: var(--primary); color: var(--primary); }

        .login-card { 
            background: var(--card-bg); 
            padding: 2.5rem; 
            border-radius: 28px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            animation: fadeInUp 0.8s ease-out;
        }
        
        #title { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin: 0 0 1.5rem 0; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            background: var(--input-bg);
            border: 2px solid var(--input-border); 
            border-radius: 16px; 
            margin-bottom: 15px; 
            font-size: 1rem; 
            font-weight: 600; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
            color: white;
        }
        input:focus { border-color: var(--primary); background: #3d4b5f; }
        input::placeholder { color: #94a3b8; }
        
        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1rem; 
            letter-spacing: 1px; 
            transition: 0.3s; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        button:active { transform: scale(0.98); }

        .verification-notice {
            display: none;
            background: #1e3a8a;
            color: #bfdbfe;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
            border: 1px solid #2563eb;
        }

        .links-container { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .reset-link { color: #f87171; font-size: 0.8rem; cursor: pointer; font-weight: 700; text-decoration: none; }
        .toggle-link { color: var(--text-sec); font-size: 0.85rem; cursor: pointer; text-decoration: none; font-weight: 600; }
        .toggle-link:hover { color: var(--primary); }

        .grecaptcha-badge { bottom: 15px !important; visibility: visible !important; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="custom-select-wrapper">
    <div class="custom-select" onclick="toggleLangMenu()">
        <div class="selected-lang" id="current-lang-display">
            <img src="https://flagcdn.com/w20/ar.png" id="selected-flag">
            <span>ES</span>
            <span class="arrow">▼</span>
        </div>
        <div class="lang-options" id="langOptions">
            <div class="option" onclick="applyLanguage('es')">
                <img src="https://flagcdn.com/w20/ar.png"> ES
            </div>
            <div class="option" onclick="applyLanguage('en')">
                <img src="https://flagcdn.com/w20/us.png"> EN
            </div>
        </div>
    </div>
</div>

    <div class="login-card">
        <h1 id="title" data-key="welcome">Bienvenido</h1>
        <input type="email" id="email" placeholder="Correo electrónico" data-lp="email">
        <input type="password" id="password" placeholder="Contraseña" data-lp="pass">
        
        <div id="verifAlert" class="verification-notice" data-key="verifNotice">
            Te enviaremos un mail de verificación. Revisa tu bandeja de entrada o SPAM. ✈️
        </div>

        <button id="mainBtn" onclick="handleAuth()" data-key="loginBtn">INGRESAR</button>
        
        <div class="links-container">
            <span class="reset-link" onclick="resetPassword()" data-key="forgot">¿Olvidaste tu contraseña?</span>
            <span class="toggle-link" id="toggleLink" onclick="toggleMode()" data-key="noAccount">¿No tienes cuenta? Regístrate aquí</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged,
            sendPasswordResetEmail,
            sendEmailVerification,
            signOut
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app-check.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53",
            measurementId: "G-WYF0L0YSYJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;

        const appCheck = initializeAppCheck(app, {
            provider: new ReCaptchaV3Provider('6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw'),
            isTokenAutoRefreshEnabled: true 
        });

        // --- MOTOR DE IDIOMAS ---
        const i18n = {
            es: {
                welcome: "Bienvenido",
                create: "Crea tu cuenta",
                email: "Correo electrónico",
                pass: "Contraseña",
                loginBtn: "INGRESAR",
                regBtn: "REGISTRARME",
                noAccount: "¿No tienes cuenta? Regístrate aquí",
                haveAccount: "¿Ya tienes cuenta? Ingresa aquí",
                verifNotice: "Te enviaremos un mail de verificación. Revisa tu bandeja de entrada o SPAM. ✈️",
                forgot: "¿Olvidaste tu contraseña?",
                alertFields: "Por favor, completa todos los campos.",
                alertRegSuccess: "¡Registro exitoso!\n\nSe ha enviado un correo de verificación a ",
                alertNoVerif: "Tu cuenta aún no ha sido verificada.",
                alertReset: "Correo de recuperación enviado.",
                alertForgotMail: "Por favor, ingresa tu correo electrónico arriba."
            },
            en: {
                welcome: "Welcome",
                create: "Create Account",
                email: "Email address",
                pass: "Password",
                loginBtn: "LOGIN",
                regBtn: "REGISTER",
                noAccount: "Don't have an account? Sign up here",
                haveAccount: "Already have an account? Login here",
                verifNotice: "We'll send you a verification email. Check your inbox or SPAM folder. ✈️",
                forgot: "Forgot your password?",
                alertFields: "Please, fill all fields.",
                alertRegSuccess: "Registration successful!\n\nA verification email has been sent to ",
                alertNoVerif: "Your account has not been verified yet.",
                alertReset: "Recovery email sent.",
                alertForgotMail: "Please enter your email address above."
            }
        };

        let currentLang = localStorage.getItem('appLang') || 'es';

        window.applyLanguage = (lang) => {
            currentLang = lang;
            localStorage.setItem('appLang', lang);
            
            // UI Update
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (i18n[lang][key]) el.innerText = i18n[lang][key];
            });

            document.querySelectorAll('[data-lp]').forEach(el => {
                const key = el.getAttribute('data-lp');
                if (i18n[lang][key]) el.placeholder = i18n[lang][key];
            });

            // Botones selector
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // Actualizar textos dinámicos si el modo cambió
            updateDynamicTexts();
        };

        const updateDynamicTexts = () => {
            document.getElementById('title').innerText = isLogin ? i18n[currentLang].welcome : i18n[currentLang].create;
            document.getElementById('mainBtn').innerText = isLogin ? i18n[currentLang].loginBtn : i18n[currentLang].regBtn;
            document.getElementById('toggleLink').innerText = isLogin ? i18n[currentLang].noAccount : i18n[currentLang].haveAccount;
        };

        let isLogin = true;

        window.toggleMode = () => {
            isLogin = !isLogin;
            updateDynamicTexts();
            document.getElementById('verifAlert').style.display = isLogin ? "none" : "block";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (!email || !pass) {
                alert(i18n[currentLang].alertFields);
                return;
            }
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(userCredential.user);
                    alert(i18n[currentLang].alertRegSuccess + email + ".");
                    await signOut(auth);
                    location.reload(); 
                }
            } catch (e) { 
                let msg = "Error: " + e.message;
                if (e.code === 'auth/app-check-failed') msg = "reCAPTCHA Error. Try again.";
                alert(msg); 
            }
        };

        window.resetPassword = async () => {
            const email = document.getElementById('email').value;
            if (!email) {
                alert(i18n[currentLang].alertForgotMail);
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert(i18n[currentLang].alertReset);
            } catch (e) { alert("Error: " + e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.emailVerified) {
                    window.location.replace("profiles.html");
                } else {
                    alert(i18n[currentLang].alertNoVerif);
                    await signOut(auth);
                }
            }
        });

        // Inicializar idioma
        applyLanguage(currentLang);

    </script>
</body>
</html>
