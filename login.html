<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxUSA — Login</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#2563eb">
    <script src="https://www.google.com/recaptcha/api.js?render=6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --accent: #7c3aed;
            --bg: #f1f5f9; --surface: #ffffff;
            --border: #e2e8f0; --input-bg: #f8fafc;
            --text: #0f172a; --text-sub: #64748b; --text-dim: #94a3b8;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --surface: #1e293b;
            --border: #334155; --input-bg: #273549;
            --text: #f1f5f9; --text-sub: #94a3b8; --text-dim: #64748b;
        }
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px; transition: background 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(37,99,235,0.15), transparent);
            pointer-events: none;
        }

        .lang-selector-top {
            position: fixed; top: 16px; right: 16px; z-index: 100;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 12px; cursor: pointer;
            user-select: none; min-width: 90px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .selected-lang {
            padding: 8px 12px; display: flex; align-items: center; gap: 8px;
            font-weight: 800; font-size: 0.85rem;
        }
        .selected-lang .arrow { font-size: 0.55rem; color: var(--primary); margin-left: auto; }
        .lang-options {
            display: none; position: absolute; top: calc(100% + 6px); left: 0;
            width: 100%; background: var(--surface);
            border: 1.5px solid var(--border); border-radius: 12px;
            overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .lang-options.show { display: block; }
        .lang-option {
            padding: 10px 12px; display: flex; align-items: center; gap: 8px;
            font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.15s;
        }
        .lang-option:hover { background: var(--input-bg); }
        .lang-option img { width: 18px; height: 13px; object-fit: cover; border-radius: 2px; }

        .login-card {
            position: relative; z-index: 1;
            background: var(--surface); padding: 36px 28px;
            border-radius: 28px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            border: 1.5px solid var(--border);
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-logo {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 28px;
            font-size: 1.6rem; font-weight: 900; color: var(--primary);
        }
        .card-logo img { width: 28px; border-radius: 3px; }

        .card-title {
            font-size: 1.5rem; font-weight: 900; text-align: center;
            margin-bottom: 24px; color: var(--text);
        }

        input {
            width: 100%; padding: 15px 16px;
            background: var(--input-bg); border: 1.5px solid var(--border);
            border-radius: 14px; margin-bottom: 12px;
            font-size: 0.95rem; font-weight: 600; font-family: inherit;
            color: var(--text); outline: none; transition: 0.25s;
            -webkit-appearance: none;
        }
        input:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
        input::placeholder { color: var(--text-dim); font-weight: 500; }

        .btn {
            width: 100%; padding: 16px; border: none;
            border-radius: 14px; font-family: inherit;
            font-size: 0.9rem; font-weight: 800;
            letter-spacing: 0.5px; text-transform: uppercase;
            cursor: pointer; transition: 0.25s; margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 16px rgba(37,99,235,0.35); }
        .btn-primary:hover { background: #1d4ed8; }

        .verif-notice {
            display: none; background: rgba(37,99,235,0.1);
            color: var(--primary); padding: 12px 14px;
            border-radius: 12px; font-size: 0.8rem; font-weight: 600;
            margin-bottom: 14px; line-height: 1.45;
            border: 1.5px solid rgba(37,99,235,0.2);
        }

        .links { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; text-align: center; }
        .link-danger { color: #ef4444; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
        .link-toggle { color: var(--text-sub); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .link-toggle:hover { color: var(--primary); }

        .grecaptcha-badge { bottom: 15px !important; }
    </style>
</head>
<body>

<div class="lang-selector-top" id="langSelector" onclick="toggleLangMenu()">
    <div class="selected-lang" id="currentLang">
        <img src="https://flagcdn.com/w20/ar.png" id="selectedFlag" alt="">
        <span id="selectedCode">ES</span>
        <span class="arrow">▼</span>
    </div>
    <div class="lang-options" id="langOptions">
        <div class="lang-option" onclick="applyLanguage('es')">
            <img src="https://flagcdn.com/w20/ar.png" alt=""> ES
        </div>
        <div class="lang-option" onclick="applyLanguage('en')">
            <img src="https://flagcdn.com/w20/us.png" alt=""> EN
        </div>
    </div>
</div>

<div class="wrap">
    <div class="login-logo-container">
        <div class="logo-icon">
            <span class="flag-stripe"></span>
            <span class="logo-symbol">T</span>
        </div>
        <div class="logo-text">
            Tax<span>USA</span>
        </div>
    </div>

    <div class="card" id="loginCard">
        <h1 class="card-title" id="cardTitle">Bienvenido</h1>
        
        <input type="email" id="email" placeholder="Correo electrónico" data-ph="email">
        <input type="password" id="password" placeholder="Contraseña" data-ph="pass">
        
        <div class="verif-notice" id="verifNotice">
            Te enviaremos un mail de verificación. Revisá tu bandeja o SPAM. ✈️
        </div>
        
        <button class="btn btn-primary" id="mainBtn" onclick="handleAuth()">INGRESAR</button>
        
        <div class="links">
            <span class="link-danger" onclick="resetPassword()" id="forgotLink">¿Olvidaste tu contraseña?</span>
            <span class="link-toggle" id="toggleLink" onclick="toggleMode()">¿No tenés cuenta? Registrate aquí</span>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app-check.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
        authDomain: "viajes-db538.firebaseapp.com",
        projectId: "viajes-db538",
        storageBucket: "viajes-db538.firebasestorage.app",
        messagingSenderId: "237311739178",
        appId: "1:237311739178:web:333e468b184c0402a98a53",
        measurementId: "G-WYF0L0YSYJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
    initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw'), isTokenAutoRefreshEnabled: true });

    const i18n = {
        es: {
            welcome: "Bienvenido", create: "Crear Cuenta",
            email: "Correo electrónico", pass: "Contraseña",
            login: "INGRESAR", register: "REGISTRARME",
            noAccount: "¿No tenés cuenta? Registrate aquí",
            haveAccount: "¿Ya tenés cuenta? Ingresá aquí",
            verif: "Te enviaremos un mail de verificación. Revisá tu bandeja o SPAM. ✈️",
            forgot: "¿Olvidaste tu contraseña?",
            errFields: "Por favor completá todos los campos.",
            regOk: "¡Registro exitoso! Se envió verificación a ",
            noVerif: "Tu cuenta aún no fue verificada.",
            resetOk: "Correo de recuperación enviado.",
            resetEmail: "Ingresá tu correo arriba primero."
        },
        en: {
            welcome: "Welcome", create: "Create Account",
            email: "Email address", pass: "Password",
            login: "LOGIN", register: "REGISTER",
            noAccount: "Don't have an account? Sign up here",
            haveAccount: "Already have an account? Log in here",
            verif: "We'll send you a verification email. Check your inbox or SPAM. ✈️",
            forgot: "Forgot your password?",
            errFields: "Please fill all fields.",
            regOk: "Registration successful! Verification sent to ",
            noVerif: "Your account hasn't been verified yet.",
            resetOk: "Recovery email sent.",
            resetEmail: "Please enter your email above first."
        }
    };

    let currentLang = localStorage.getItem('appLang') || 'es';
    let isLogin = true;

    window.toggleLangMenu = () => document.getElementById('langOptions').classList.toggle('show');
    window.onclick = (e) => { if (!e.target.closest('#langSelector')) document.getElementById('langOptions').classList.remove('show'); };

    window.applyLanguage = (lang) => {
        currentLang = lang;
        localStorage.setItem('appLang', lang);
        const flagSrc = lang === 'es' ? 'https://flagcdn.com/w20/ar.png' : 'https://flagcdn.com/w20/us.png';
        document.getElementById('selectedFlag').src = flagSrc;
        document.getElementById('selectedCode').innerText = lang.toUpperCase();
        document.getElementById('langOptions').classList.remove('show');
        applyTexts();
    };

    function applyTexts() {
        const t = i18n[currentLang];
        document.getElementById('cardTitle').innerText = isLogin ? t.welcome : t.create;
        document.getElementById('mainBtn').innerText = isLogin ? t.login : t.register;
        document.getElementById('toggleLink').innerText = isLogin ? t.noAccount : t.haveAccount;
        document.getElementById('forgotLink').innerText = t.forgot;
        document.getElementById('verifNotice').innerText = t.verif;
        document.getElementById('email').placeholder = t.email;
        document.getElementById('password').placeholder = t.pass;
    }

    window.toggleMode = () => {
        isLogin = !isLogin;
        document.getElementById('verifNotice').style.display = isLogin ? 'none' : 'block';
        applyTexts();
    };

    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const t = i18n[currentLang];
        if (!email || !pass) { alert(t.errFields); return; }
        try {
            if (isLogin) {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(cred.user);
                alert(t.regOk + email);
                await signOut(auth);
                location.reload();
            }
        } catch(e) {
            let msg = e.message;
            if (e.code === 'auth/app-check-failed') msg = 'reCAPTCHA validation error.';
            alert(msg);
        }
    };

    window.resetPassword = async () => {
        const email = document.getElementById('email').value;
        const t = i18n[currentLang];
        if (!email) { alert(t.resetEmail); return; }
        try { await sendPasswordResetEmail(auth, email); alert(t.resetOk); }
        catch(e) { alert(e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            if (user.emailVerified) window.location.replace('profiles.html');
            else { alert(i18n[currentLang].noVerif); await signOut(auth); }
        }
    });

    applyLanguage(currentLang);
</script>
</body>
</html>
