<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - TaxUSA</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text-main: #1e293b; --accent: #1e3a8a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .login-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 28px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            animation: fadeInUp 0.8s ease-out;
        }
        
        #title { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin: 0 0 1.5rem 0; }
        
        input { width: 100%; padding: 16px; border: 2px solid #f1f5f9; border-radius: 16px; margin-bottom: 15px; font-size: 1rem; font-weight: 600; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #fdfdfd; }
        
        button { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1rem; letter-spacing: 1px; transition: 0.3s; }
        button:active { transform: scale(0.98); }

        /* Estilo para el aviso de verificación */
        .verification-notice {
            display: none;
            background: #eff6ff;
            color: #1e40af;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
            border: 1px solid #dbeafe;
        }

        .links-container { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .reset-link { color: #ef4444; font-size: 0.8rem; cursor: pointer; font-weight: 700; text-decoration: none; }
        .toggle-link { color: #64748b; font-size: 0.85rem; cursor: pointer; text-decoration: none; font-weight: 600; }
        .toggle-link:hover { color: var(--primary); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 id="title">Bienvenido</h1>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        
        <div id="verifAlert" class="verification-notice">
            Te enviaremos un mail de verificación. Puede que el mensaje esté en inglés, pero es seguro. ✈️
        </div>

        <button id="mainBtn" onclick="handleAuth()">INGRESAR</button>
        
        <div class="links-container">
            <span class="reset-link" onclick="resetPassword()">¿Olvidaste tu contraseña?</span>
            <span class="toggle-link" id="toggleLink" onclick="toggleMode()">¿No tienes cuenta? Regístrate aquí</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged,
            sendPasswordResetEmail,
            sendEmailVerification,
            signOut
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53",
            measurementId: "G-WYF0L0YSYJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let isLogin = true;

        window.toggleMode = () => {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "Bienvenido" : "Crea tu cuenta";
            document.getElementById('mainBtn').innerText = isLogin ? "INGRESAR" : "REGISTRARME";
            document.getElementById('toggleLink').innerText = isLogin ? "¿No tienes cuenta? Regístrate aquí" : "¿Ya tienes cuenta? Ingresa aquí";
            
            // Mostrar/Ocultar aviso de verificación
            document.getElementById('verifAlert').style.display = isLogin ? "none" : "block";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (!email || !pass) {
                alert("Por favor, completa todos los campos.");
                return;
            }
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    // Enviar correo de verificación
                    await sendEmailVerification(userCredential.user);
                    
                    alert("¡Registro exitoso!\n\nSe ha enviado un correo de verificación a " + email + ".\n\nIMPORTANTE: Revisa tu bandeja de entrada y la carpeta de SPAM. No podrás ingresar hasta que valides tu cuenta.");
                    
                    // Forzar cierre de sesión hasta que verifique
                    await signOut(auth);
                    location.reload(); 
                }
            } catch (e) { alert("Error: " + e.message); }
        };

        window.resetPassword = async () => {
            const email = document.getElementById('email').value;
            if (!email) {
                alert("Por favor, ingresa tu correo electrónico arriba.");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Correo de recuperación enviado. Revisa también tu carpeta de SPAM.");
            } catch (e) { alert("Error: " + e.message); }
        };

        // Escuchador de estado con bloqueo de verificación
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.emailVerified) {
                    window.location.replace("index.html");
                } else {
                    alert("Tu cuenta aún no ha sido verificada. Por favor, revisa tu correo (y la carpeta de SPAM) para activar tu acceso.");
                    await signOut(auth);
                }
            }
        });
    </script>
</body>
</html>
