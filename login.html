<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - TaxUSA</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 14px; margin-bottom: 12px; font-size: 1rem; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; }
        .toggle-link { margin-top: 20px; display: block; color: #64748b; font-size: 0.9rem; cursor: pointer; text-decoration: underline; }
        .reset-link { margin-top: 15px; display: block; color: #ef4444; font-size: 0.8rem; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 id="title">Bienvenido</h1>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="mainBtn" onclick="handleAuth()">INGRESAR</button>
        
        <span class="reset-link" onclick="resetPassword()">¿Olvidaste tu contraseña?</span>
        
        <span class="toggle-link" id="toggleLink" onclick="toggleMode()">¿No tienes cuenta? Regístrate aquí</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged,
            sendPasswordResetEmail 
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U",
            authDomain: "viajes-db538.firebaseapp.com",
            projectId: "viajes-db538",
            storageBucket: "viajes-db538.firebasestorage.app",
            messagingSenderId: "237311739178",
            appId: "1:237311739178:web:333e468b184c0402a98a53",
            measurementId: "G-WYF0L0YSYJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let isLogin = true;

        window.toggleMode = () => {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "Bienvenido" : "Crea tu cuenta";
            document.getElementById('mainBtn').innerText = isLogin ? "INGRESAR" : "REGISTRARME";
            document.getElementById('toggleLink').innerText = isLogin ? "¿No tienes cuenta? Regístrate aquí" : "¿Ya tienes cuenta? Ingresa aquí";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (!email || !pass) {
                alert("Por favor, completa todos los campos.");
                return;
            }
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert("Error: " + e.message); }
        };

        // Función para enviar el correo de restablecimiento
        window.resetPassword = async () => {
            const email = document.getElementById('email').value;
            if (!email) {
                alert("Por favor, ingresa tu correo electrónico arriba para enviarte el link de recuperación.");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Se ha enviado un correo a " + email + " para restablecer tu contraseña. Revisa tu bandeja de entrada o spam.");
            } catch (e) {
                alert("Error: " + e.message);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.replace("index.html");
        });
    </script>
</body>
</html>
